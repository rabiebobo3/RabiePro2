name: Rabie_ORA_Ultimate_StandAlone

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # بناء المشروع بالكامل داخل الـ YAML (بدون الاعتماد على ملفات خارجية)
      - name: Create Full Project Structure
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/rabie/ora/
          mkdir -p app/src/main/res/layout/
          mkdir -p app/src/main/res/drawable/
          mkdir -p app/src/main/res/values/

      - name: Create Gradle Settings
        run: |
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Create App Module (Full Dependencies)
        run: |
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.ora'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.ora"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-ORA"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
          }
          EOF

      - name: Create ORA Visuals (XML)
        run: |
          # تصميم التدرج البنفسجي
          cat <<EOF > app/src/main/res/drawable/ora_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#1A0033" android:endColor="#000000" android:angle="270" />
          </shape>
          EOF
          
          # واجهة ORA Style كاملة
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/ora_bg">
              <com.google.android.exoplayer2.ui.StyledPlayerView
                  android:id="@+id/player_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="RABIE ORA PRO"
                  android:textColor="#A020F0"
                  android:layout_centerInParent="true"
                  android:textSize="32sp"
                  android:textStyle="bold" />
          </RelativeLayout>
          EOF

      - name: Create Java and Manifest
        run: |
          cat <<EOF > app/src/main/java/com/rabie/ora/MainActivity.java
          package com.rabie.ora;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Rabie ORA Pro" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.rabie.ora.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: The "Final Force" Build
        run: |
          # هنا السر: نستخدم نسخة قاردل مستقرة ونمنع السيرفر من تحديثها
          gradle wrapper --gradle-version 8.0.2
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_ORA_Ultimate_APK
          path: app/build/outputs/apk/debug/*.apk
