name: Rabie_ORA_No_Excuses_Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # بناء المصنع من الصفر (كل الملفات نكرييوها هنا)
      - name: Generate Project Files
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/rabie/ora/ app/src/main/res/layout/ app/src/main/res/drawable/ app/src/main/res/values/
          
          # 1. ملف settings.gradle
          echo "include ':app'" > settings.gradle
          
          # 2. ملف build.gradle (الأساسي)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. ملف build.gradle (App) - مع ستايل ORA
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.ora'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.ora"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-ORA"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
              implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
          }
          EOF

          # 4. الألوان (الخلفية البنفسجية المتدرجة)
          cat <<EOF > app/src/main/res/drawable/ora_gradient.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#1A0033" android:endColor="#000000" android:angle="270" />
          </shape>
          EOF

          # 5. الواجهة (Layout)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/ora_gradient">
              <com.google.android.exoplayer2.ui.StyledPlayerView
                  android:id="@+id/player_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="RABIE ORA PRO"
                  android:textColor="#A020F0"
                  android:layout_centerInParent="true"
                  android:textSize="24sp"
                  android:textStyle="bold" />
          </RelativeLayout>
          EOF

          # 6. كود الجافا (MainActivity)
          cat <<EOF > app/src/main/java/com/rabie/ora/MainActivity.java
          package com.rabie.ora;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          # 7. المانيفست (Manifest)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Rabie ORA" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.rabie.ora.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # تشغيل القاردل (Gradle Wrapper) يدوياً لقطع كل الحجج
      - name: Force Build
        run: |
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ORA_Style_Result
          path: app/build/outputs/apk/debug/*.apk
