name: Rabie_Pro_V41_Original_Logic_With_VLC

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_V41_VLC_Stable
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          
          # إعدادات الذاكرة لحل مشكلة توقف البناء
          echo "org.gradle.jvmargs=-Xmx4g" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/values
          
          curl -Lo app/src/main/res/mipmap-hdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="colorPrimary">#05030A</color>
              <color name="colorAccent">#FF9100</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources><string name="app_name">Rabie Pro V41</string></resources>
          EOF

          # تصميم الواجهة الأصلية مع إضافة طبقة VLC
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:keepScreenOn="true">
              <LinearLayout android:id="@+id/splash_screen" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:gravity="center" android:elevation="20dp">
                  <androidx.cardview.widget.CardView android:layout_width="150dp" android:layout_height="150dp" app:cardCornerRadius="75dp" app:cardBackgroundColor="#000"><ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/></androidx.cardview.widget.CardView>
              </LinearLayout>
              <LinearLayout android:id="@+id/main_ui_container" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:visibility="gone">
                  <LinearLayout android:layout_width="match_parent" android:layout_height="65dp" android:background="#000" android:gravity="center_vertical" android:padding="10dp">
                      <ImageView android:layout_width="45dp" android:layout_height="45dp" android:src="@drawable/app_logo"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RABIE PRO" android:textColor="#ff9100" android:textStyle="bold" android:textSize="20sp" android:layout_marginLeft="10dp"/>
                      <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:background="@drawable/tab_button_style" android:textColor="#EEE" android:layout_marginRight="5dp"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:background="@drawable/tab_button_style" android:textColor="#EEE" android:layout_marginRight="5dp"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:background="@drawable/tab_button_style" android:textColor="#EEE" android:layout_marginRight="5dp"/>
                      <Button android:id="@+id/tab_fav" android:layout_width="50dp" android:layout_height="42dp" android:text="⭐" android:background="@drawable/tab_button_style"/>
                      <ImageButton android:id="@+id/btn_switch_player" android:layout_width="45dp" android:layout_height="42dp" android:src="@android:drawable/ic_menu_manage" android:background="@drawable/tab_button_style" android:tint="#ff9100" android:layout_marginLeft="5dp"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal">
                      <LinearLayout android:id="@+id/left_side" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.55" android:orientation="vertical" android:padding="10dp">
                          <androidx.cardview.widget.CardView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.65" app:cardCornerRadius="15dp" app:cardBackgroundColor="#000">
                              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent">
                                  <androidx.media3.ui.PlayerView android:id="@+id/small_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false"/>
                                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_small" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
                              </FrameLayout>
                          </androidx.cardview.widget.CardView>
                          <TextView android:id="@+id/txt_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#ff9100" android:textSize="18sp" android:padding="10dp" android:text="اختر محتوى"/>
                          <Button android:id="@+id/btn_toggle_fav" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="⭐ إضافة للمفضلة" android:background="@drawable/focus_highlight" android:textColor="#FFF"/>
                      </LinearLayout>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_items" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.25" android:background="#0A0817"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_groups" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.20" android:background="#120E26"/>
                  </LinearLayout>
              </LinearLayout>
              <FrameLayout android:id="@+id/full_container" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" android:background="#000">
                  <androidx.media3.ui.PlayerView android:id="@+id/full_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="true"/>
                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_full" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
                  <ProgressBar android:id="@+id/loading_f" android:layout_width="80dp" android:layout_height="80dp" android:layout_gravity="center" android:indeterminateTint="#ff9100" android:visibility="gone"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # كود الجافا (V41 الأصلية مع دمج محرك VLC)
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.activity.OnBackPressedCallback;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.MediaItem;
          import androidx.media3.exoplayer.ExoPlayer;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.*;
          import com.android.volley.Request;
          import com.android.volley.toolbox.StringRequest;
          import com.android.volley.toolbox.Volley;
          import com.google.gson.Gson;
          import com.google.gson.reflect.TypeToken;
          import org.videolan.libvlc.LibVLC;
          import org.videolan.libvlc.Media;
          import org.videolan.libvlc.MediaPlayer;
          import org.videolan.libvlc.util.VLCVideoLayout;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer exoPlayer;
              private LibVLC libVLC;
              private MediaPlayer vlcPlayer;
              private PlayerView exoSmall, exoFull;
              private VLCVideoLayout vlcSmall, vlcFull;
              private boolean useVLC = false;
              private List<Ch> database = new ArrayList<>();
              private Map<String, List<Ch>> live = new LinkedHashMap<>(), movie = new LinkedHashMap<>(), series = new LinkedHashMap<>();
              private List<Ch> favList = new ArrayList<>(), currentItems = new ArrayList<>();
              private Stack<String> historyStack = new Stack<>();
              private String currentCat = "", currentMode = "live", currentParentId = "root";
              private Ch currentCh;
              private RecyclerView rvG, rvI;
              private TextView tTitle;
              private View mainUI, fullCont, splash, leftSide;
              private ProgressBar pf;

              static class Ch { String n, u, g, l, id, pid, isF; }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  useVLC = getSharedPreferences("set", MODE_PRIVATE).getBoolean("vlc", false);

                  splash = findViewById(R.id.splash_screen); mainUI = findViewById(R.id.main_ui_container);
                  exoSmall = findViewById(R.id.small_player); exoFull = findViewById(R.id.full_player);
                  vlcSmall = findViewById(R.id.vlc_small); vlcFull = findViewById(R.id.vlc_full);
                  fullCont = findViewById(R.id.full_container); leftSide = findViewById(R.id.left_side);
                  tTitle = findViewById(R.id.txt_title); pf = findViewById(R.id.loading_f);
                  rvG = findViewById(R.id.rv_groups); rvI = findViewById(R.id.rv_items);

                  initExo(); initVLC(); updateViews();
                  rvG.setLayoutManager(new LinearLayoutManager(this));

                  loadFavs(); loadData();

                  findViewById(R.id.btn_switch_player).setOnClickListener(v -> {
                      String[] ops = {"ExoPlayer", "VLC Player"};
                      new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog).setTitle("اختر المشغل")
                          .setSingleChoiceItems(ops, useVLC?1:0, (d, w) -> {
                              useVLC = (w==1); getSharedPreferences("set", MODE_PRIVATE).edit().putBoolean("vlc", useVLC).apply();
                              updateViews(); stopAll(); d.dismiss();
                          }).show();
                  });

                  findViewById(R.id.tab_live).setOnClickListener(v -> setMode("live"));
                  findViewById(R.id.tab_movie).setOnClickListener(v -> setMode("movie"));
                  findViewById(R.id.tab_series).setOnClickListener(v -> setMode("series"));
                  findViewById(R.id.tab_fav).setOnClickListener(v -> setMode("fav"));

                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override public void handleOnBackPressed() {
                          if (fullCont.getVisibility() == View.VISIBLE) toggleFull(false);
                          else if (!historyStack.isEmpty()) renderGallery(historyStack.pop());
                          else finish();
                      }
                  });
                  new Handler(Looper.getMainLooper()).postDelayed(() -> splash.setVisibility(View.GONE), 2000);
              }

              private void initExo() { exoPlayer = new ExoPlayer.Builder(this).build(); exoSmall.setPlayer(exoPlayer); }
              private void initVLC() { ArrayList<String> ops = new ArrayList<>(); ops.add("--network-caching=5000"); libVLC = new LibVLC(this, ops); vlcPlayer = new MediaPlayer(libVLC); }

              private void updateViews() {
                  exoSmall.setVisibility(useVLC?View.GONE:View.VISIBLE);
                  vlcSmall.setVisibility(useVLC?View.VISIBLE:View.GONE);
              }

              private void setMode(String m) {
                  currentMode = m; historyStack.clear();
                  if (m.equals("fav")) { rvG.setVisibility(View.GONE); currentItems = new ArrayList<>(favList); rvI.setAdapter(new ItemAdapter(currentItems)); return; }
                  rvG.setVisibility(View.VISIBLE);
                  Map<String, List<Ch>> d = m.equals("movie")?movie:(m.equals("series")?series:live);
                  List<String> groups = new ArrayList<>(d.keySet());
                  rvG.setAdapter(new GroupAdapter(groups));
                  if (!groups.isEmpty()) { currentCat = groups.get(0); renderGallery("root"); }
              }

              private void renderGallery(String pid) {
                  currentParentId = pid; List<Ch> filtered = new ArrayList<>();
                  for (Ch i : database) if (getT(i).equals(currentMode) && i.g.equals(currentCat) && i.pid.equals(pid)) filtered.add(i);
                  currentItems = filtered; rvI.setAdapter(new ItemAdapter(currentItems));
              }

              private void play(Ch c) {
                  currentCh = c; stopAll(); tTitle.setText(c.n);
                  if (useVLC) {
                      vlcPlayer.attachViews(fullCont.getVisibility()==View.VISIBLE?vlcFull:vlcSmall, null, false, false);
                      Media m = new Media(libVLC, Uri.parse(c.u)); m.setHWDecoderEnabled(true, true);
                      vlcPlayer.setMedia(m); vlcPlayer.play();
                  } else {
                      exoPlayer.setMediaItem(MediaItem.fromUri(c.u)); exoPlayer.prepare(); exoPlayer.play();
                  }
              }

              private void stopAll() { if(exoPlayer.isPlaying()) exoPlayer.stop(); if(vlcPlayer.isPlaying()) vlcPlayer.stop(); }

              private void toggleFull(boolean full) {
                  stopAll();
                  if (full) {
                      mainUI.setVisibility(View.GONE); fullCont.setVisibility(View.VISIBLE);
                      exoFull.setVisibility(useVLC?View.GONE:View.VISIBLE); vlcFull.setVisibility(useVLC?View.VISIBLE:View.GONE);
                      if (!useVLC) exoFull.setPlayer(exoPlayer);
                  } else {
                      fullCont.setVisibility(View.GONE); mainUI.setVisibility(View.VISIBLE); updateViews();
                  }
                  if (currentCh != null) play(currentCh);
              }

              private String getT(Ch c) {
                  String g = c.g.toLowerCase();
                  if (g.contains("movie") || g.contains("أفلام")) return "movie";
                  if (g.contains("series") || g.contains("مسلسل") || "1".equals(c.isF)) return "series";
                  return "live";
              }

              private void loadData() {
                  String url = "https://gist.githubusercontent.com/rabiebobo3/d498347610d7312b3e9be88093117620/raw/list.m3u";
                  Volley.newRequestQueue(this).add(new StringRequest(Request.Method.GET, url, res -> { parse(res); setMode("live"); }, null));
              }

              private void parse(String text) {
                  database.clear(); live.clear(); movie.clear(); series.clear();
                  String[] lines = text.split("\n"); Ch cur = null;
                  for (String l : lines) {
                      if (l.contains("#EXTINF:")) {
                          cur = new Ch(); cur.n = l.split(",").length > 1 ? l.split(",")[1].trim() : "Unknown";
                          cur.g = l.contains("group-title=\"") ? l.split("group-title=\"")[1].split("\"")[0] : "General";
                          cur.id = l.contains("tvg-id=\"") ? l.split("tvg-id=\"")[1].split("\"")[0] : "";
                          cur.pid = l.contains("parent-id=\"") ? l.split("parent-id=\"")[1].split("\"")[0] : "root";
                          cur.isF = l.contains("is-folder=\"") ? l.split("is-folder=\"")[1].split("\"")[0] : "0";
                      } else if (l.startsWith("http") && cur != null) {
                          cur.u = l.trim(); database.add(cur);
                          String type = getT(cur); Map<String, List<Ch>> d = type.equals("movie")?movie:(type.equals("series")?series:live);
                          d.computeIfAbsent(cur.g, k->new ArrayList<>()).add(cur); cur = null;
                      }
                  }
              }

              private void loadFavs() { String j = getSharedPreferences("p", MODE_PRIVATE).getString("f", "[]"); favList = new Gson().fromJson(j, new TypeToken<List<Ch>>(){}.getType()); }

              class GroupAdapter extends RecyclerView.Adapter<GroupAdapter.VH> {
                  List<String> g; GroupAdapter(List<String> g) { this.g = g; }
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_list, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      h.n.setText(g.get(i)); h.itemView.setOnClickListener(v -> { currentCat = g.get(i); renderGallery("root"); });
                  }
                  public int getItemCount() { return g.size(); }
                  class VH extends RecyclerView.ViewHolder { TextView n; VH(View v) { super(v); n = v.findViewById(R.id.txt_name); } }
              }

              class ItemAdapter extends RecyclerView.Adapter<ItemAdapter.VH> {
                  List<Ch> items; ItemAdapter(List<Ch> i) { items = i; }
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_list, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      Ch c = items.get(i); h.n.setText(c.n);
                      h.itemView.setOnClickListener(v -> { if("1".equals(c.isF)){ historyStack.push(currentParentId); renderGallery(c.id); } else play(c); });
                      h.itemView.setOnLongClickListener(v -> { toggleFull(true); return true; });
                  }
                  public int getItemCount() { return items.size(); }
                  class VH extends RecyclerView.ViewHolder { TextView n; VH(View v) { super(v); n = v.findViewById(R.id.txt_name); } }
              }
              @Override protected void onStop() { super.onStop(); stopAll(); }
          }
          EOF

          # تصميم العناصر والملفات المساعدة
          cat <<EOF > app/src/main/res/layout/item_list.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="12dp" android:focusable="true" android:background="@drawable/focus_highlight"><TextView android:id="@+id/txt_name" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#FFF" android:textSize="14sp" android:gravity="right"/></LinearLayout>
          EOF
          cat <<EOF > app/src/main/res/drawable/tab_button_style.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android"><item android:state_focused="true"><shape><solid android:color="#ff9100"/><corners android:radius="10dp"/></shape></item><item><shape><solid android:color="#1A1A1A"/><corners android:radius="10dp"/></shape></item></selector>
          EOF
          cat <<EOF > app/src/main/res/drawable/focus_highlight.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android"><item android:state_focused="true"><shape><solid android:color="#33FF9100"/><stroke android:width="2dp" android:color="#ff9100"/></shape></item><item><shape><solid android:color="@android:color/transparent"/></shape></item></selector>
          EOF

          # ملف البناء النهائي مع حلول أخطاء التكرار
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 41; versionName "41.0" }
              packagingOptions { resources.excludes += "DebugProbesKt.bin"; pickFirst 'lib/*/libc++_shared.so' }
          }
          configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:label="Rabie Pro" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_APK
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V41_VLC_Exo, path: app/build/outputs/apk/debug/*.apk }
