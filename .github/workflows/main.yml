                  android:hardwareAccelerated="true"
                  android:largeHeap="true">
                  <meta-data android:name="com.google.android.gms.cast.framework.OPTIONS_PROVIDER_CLASS_NAME" android:value="com.rabie.iptv.CastOptionsProvider"/>
                  <activity android:name="com.rabie.iptv.MainActivity" 
                      android:exported="true" 
                      android:screenOrientation="landscape" 
                      android:configChanges="orientation|screenSize|keyboard|keyboardHidden|navigation">
                      <intent-filter>
