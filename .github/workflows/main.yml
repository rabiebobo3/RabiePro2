name: Rabie_Pro_V42_Final_Pistache
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Ultimate_No_Duplicate
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/values
          
          # تحميل الشعار والملفات الأساسية
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg
          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-hdpi/ic_launcher.png

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 42; versionName "42.0" }
              
              # الحل القاتل لتضارب الكوتلن
              configurations.all {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              }
              
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.media3:media3-exoplayer-hls:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              implementation 'de.hdodenhof:circleimageview:3.1.0'
          }
          EOF

          # [تأكد من وضع كود المانيفست والجافا واللايوت هنا]
          # تم تنظيف الـ dependencies لتقليل احتمالية الخطأ

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_V42_Apk
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V42_Clean, path: app/build/outputs/apk/debug/*.apk }
