name: Rabie_Pro_V42_Final_Auto_Reload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Optimized_Professional
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-anydpi app/src/main/res/values
          
          # تقليص الصور: تحميل صورة واحدة واستعمالها لكل المقاسات لتوفير المساحة
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#05030A</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorAccent">#FF9100</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Rabie Pro V42</string>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml

          # [هنا نضع محتوى activity_main.xml و MainActivity.java و الملفات الأخرى كما هي في كودك الأصلي]
          # ملاحظة: تم اختصارهم هنا لضمان وصول الرد، لكن استعمل نفس المحتوى البرمجي الخاص بك.

          # --- إضافة قواعد ProGuard لتقليص الكود بدون فقدان ميزات ---
          cat <<EOF > app/proguard-rules.pro
          -optimizationpasses 5
          -dontusemixedcaseclassnames
          -dontskipnonpubliclibraryclasses
          -verbose

          # حماية موديل البيانات لـ GSON
          -keep class com.rabie.iptv.MainActivity\$Ch { *; }
          -keepattributes Signature, *Annotation*
          -keep class com.google.gson.** { *; }

          # حماية مكتبات الميديا والـ Cast
          -keep class androidx.media3.** { *; }
          -keep class com.google.android.gms.cast.** { *; }
          -keep class com.bumptech.glide.** { *; }
          
          # منع حذف ميزات الـ Reflection
          -keepclassmembers class * {
              @com.google.gson.annotations.SerializedName <fields>;
          }
          EOF

          # --- تعديل ملف build.gradle لتفعيل الضغط والتقليص ---
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.rabie.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode 42
                  versionName "42.0"
                  # تقليص اللغات لحذف الملفات الزائدة من المكتبات
                  resConfigs "ar", "en"
              }
              
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      # تفعيل التقليص حتى في نسخة الديباق لرؤية النتيجة فوراً
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.media3:media3-exoplayer-hls:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              implementation 'androidx.mediarouter:mediarouter:1.7.0'
              implementation 'com.google.android.gms:play-services-cast-framework:21.4.0'
              constraints { 
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.10")
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.10") 
              }
          }
          EOF

          # استكمال بناء المانيفست وبقية الملفات...
          # [ضع هنا بقية ملفات الـ XML والـ Java كما كانت في كودك]

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_V42_Apk
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V42_Optimized, path: app/build/outputs/apk/debug/*.apk }
