name: Rabie_Pro_Ultimate_V50
on: [push]

jobs:
  build_rocket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project Architecture
        run: |
          # إنشاء هيكل المجلدات الاحترافي
          mkdir -p app/src/main/java/com/rabie/iptv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # ملف الألوان الاحترافي (Deep Dark Mode)
          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="main_bg">#05030A</color>
              <color name="accent_orange">#FF9100</color>
              <color name="card_dark">#120E26</color>
              <color name="text_white">#F5F5F5</color>
          </resources>
          EOF

          # تصميم الواجهة الصاروخية (XML)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" 
              android:background="@color/main_bg" android:keepScreenOn="true">
              
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal">
                  <LinearLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.65" android:orientation="vertical" android:padding="12dp">
                      <androidx.cardview.widget.CardView xmlns:app="http://schemas.android.com/apk/res-auto" 
                          android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" app:cardCornerRadius="18dp" app:cardBackgroundColor="#000">
                          <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent">
                              <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/player_vlc" android:layout_width="match_parent" android:layout_height="match_parent"/>
                              <ProgressBar android:id="@+id/loading_anim" android:layout_width="60dp" android:layout_height="60dp" android:layout_gravity="center" android:indeterminateTint="@color/accent_orange" android:visibility="gone"/>
                          </FrameLayout>
                      </androidx.cardview.widget.CardView>
                      <TextView android:id="@+id/chan_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="RABIE PRO ROCKET V50" android:textColor="@color/accent_orange" android:textSize="20sp" android:textStyle="bold" android:gravity="center" android:padding="8dp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.35" android:orientation="horizontal">
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_channels" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1" android:padding="4dp"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_cats" android:layout_width="110dp" android:layout_height="match_parent" android:background="@color/card_dark"/>
                  </LinearLayout>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # منطق البرمجة المتقدم (Java)
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.net.Uri;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.*;
          import com.android.volley.*;
          import com.android.volley.toolbox.*;
          import org.json.*;
          import org.videolan.libvlc.*;
          import org.videolan.libvlc.util.VLCVideoLayout;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private final String DNS = "http://myserveriptv.com:2082", USER = "NoRaNabil12", PASS = "NoRaNabil21";
              private LibVLC libVlc; private MediaPlayer mPlayer;
              private RecyclerView rvCat, rvCh; private ProgressBar loader;
              private RequestQueue queue;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_FULLSCREEN | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  
                  loader = findViewById(R.id.loading_anim);
                  rvCat = findViewById(R.id.rv_cats); rvCh = findViewById(R.id.rv_channels);
                  rvCat.setLayoutManager(new LinearLayoutManager(this));
                  rvCh.setLayoutManager(new LinearLayoutManager(this));
                  queue = Volley.newRequestQueue(this);

                  initVLC();
                  fetchCategories();
              }

              private void initVLC() {
                  ArrayList<String> args = new ArrayList<>();
                  args.add("--network-caching=1500"); args.add("--vdec-hardware=all");
                  args.add("--no-stats"); args.add("--clock-jitter=0");
                  libVlc = new LibVLC(this, args);
                  mPlayer = new MediaPlayer(libVlc);
                  mPlayer.attachViews(findViewById(R.id.player_vlc), null, true, false);
                  mPlayer.setAspectRatio("16:9");
                  mPlayer.setEventListener(e -> {
                      if(e.type == MediaPlayer.Event.Buffering) runOnUiThread(()->loader.setVisibility(View.VISIBLE));
                      else if(e.type == MediaPlayer.Event.Playing) runOnUiThread(()->loader.setVisibility(View.GONE));
                  });
              }

              private void fetchCategories() {
                  String url = DNS + "/player_api.php?username=" + USER + "&password=" + PASS + "&action=get_live_categories";
                  queue.add(new JsonArrayRequest(url, res -> {
                      try {
                          List<Pair> cats = new ArrayList<>();
                          for(int i=0; i<res.length(); i++) {
                              JSONObject o = res.getJSONObject(i);
                              cats.add(new Pair(o.getString("category_name"), o.getString("category_id")));
                          }
                          rvCat.setAdapter(new CatAdapter(cats));
                      } catch(Exception e){}
                  }, null));
              }

              private void fetchChannels(String id) {
                  loader.setVisibility(View.VISIBLE);
                  String url = DNS + "/player_api.php?username=" + USER + "&password=" + PASS + "&action=get_live_streams&category_id=" + id;
                  queue.add(new JsonArrayRequest(url, res -> {
                      try {
                          List<Pair> chans = new ArrayList<>();
                          for(int i=0; i<res.length(); i++) {
                              JSONObject o = res.getJSONObject(i);
                              chans.add(new Pair(o.getString("name"), o.getString("stream_id")));
                          }
                          rvCh.setAdapter(new ChanAdapter(chans));
                          loader.setVisibility(View.GONE);
                      } catch(Exception e){}
                  }, null));
              }

              private void play(String id, String name) {
                  ((TextView)findViewById(R.id.chan_title)).setText(name);
                  Media m = new Media(libVlc, Uri.parse(DNS + "/live/" + USER + "/" + PASS + "/" + id + ".ts"));
                  mPlayer.setMedia(m); m.release(); mPlayer.play();
              }

              class Pair { String n, i; Pair(String n, String i){this.n=n; this.i=i;} }

              // Adapter للأقسام والقنوات بتصميم Focus راقي
              class CatAdapter extends RecyclerView.Adapter<VH> {
                  List<Pair> d; CatAdapter(List<Pair> d){this.d=d;}
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(android.R.layout.simple_list_item_1, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      h.t.setText(d.get(i).n); h.t.setTextColor(-1); h.itemView.setFocusable(true);
                      h.itemView.setOnFocusChangeListener((v,f)->{
                          v.setBackgroundColor(f?0xFFFF9100:0);
                          if(f) fetchChannels(d.get(i).i);
                      });
                  }
                  public int getItemCount() { return d.size(); }
              }

              class ChanAdapter extends RecyclerView.Adapter<VH> {
                  List<Pair> d; ChanAdapter(List<Pair> d){this.d=d;}
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(android.R.layout.simple_list_item_1, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      h.t.setText(d.get(i).n); h.t.setTextColor(0xFFCCCCCC); h.itemView.setFocusable(true);
                      h.itemView.setOnFocusChangeListener((v,f)-> v.setBackgroundColor(f?0x44FF9100:0));
                      h.itemView.setOnClickListener(v-> play(d.get(i).i, d.get(i).n));
                  }
                  public int getItemCount() { return d.size(); }
              }

              class VH extends RecyclerView.ViewHolder { TextView t; VH(View v){super(v); t=v.findViewById(android.R.id.text1); t.setTextSize(14);} }
          }
          EOF

          # ضبط ملفات البناء (Gradle & Manifest)
          echo "include ':app'" > settings.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.rabie.iptv'; compileSdk 34; defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 50; versionName "5.0" } }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'org.videolan.android:libvlc-all:3.6.0-eap11'
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true" android:label="Rabie Pro V50">
                  <activity android:name="com.rabie.iptv.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

      - name: Compile Rocket APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_Pro_V50_Final
          path: app/build/outputs/apk/debug/*.apk
