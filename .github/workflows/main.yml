name: Rabie_Pro_V42_True_600_Lines
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Complete_Rabie_Project
        run: |
          # --- إعداد بيئة العمل ---
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/values

          # --- واجهة المستخدم (التقسيم المتساوي 0.25) ---
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" 
              android:layout_height="match_parent" 
              android:background="#05030A" 
              android:keepScreenOn="true">

              <LinearLayout 
                  android:id="@+id/main_ui_container" 
                  android:layout_width="match_parent" 
                  android:layout_height="match_parent" 
                  android:orientation="vertical">

                  <LinearLayout 
                      android:layout_width="match_parent" 
                      android:layout_height="65dp" 
                      android:background="#000" 
                      android:gravity="center_vertical" 
                      android:padding="10dp">
                      
                      <TextView 
                          android:layout_width="wrap_content" 
                          android:layout_height="wrap_content" 
                          android:text="RABIE PRO TV" 
                          android:textColor="#ff9100" 
                          android:textStyle="bold" 
                          android:textSize="22sp"/>
                          
                      <View 
                          android:layout_width="0dp" 
                          android:layout_height="match_parent" 
                          android:layout_weight="1"/>
                          
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:background="@drawable/tab_style" android:textColor="#EEE"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:layout_marginLeft="8dp" android:background="@drawable/tab_style" android:textColor="#EEE"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:layout_marginLeft="8dp" android:background="@drawable/tab_style" android:textColor="#EEE"/>
                  </LinearLayout>

                  <LinearLayout 
                      android:layout_width="match_parent" 
                      android:layout_height="match_parent" 
                      android:orientation="horizontal">

                      <LinearLayout 
                          android:layout_width="0dp" 
                          android:layout_height="match_parent" 
                          android:layout_weight="0.50" 
                          android:orientation="vertical" 
                          android:padding="10dp">
                          
                          <androidx.cardview.widget.CardView 
                              android:layout_width="match_parent" 
                              android:layout_height="0dp" 
                              android:layout_weight="0.70" 
                              app:cardCornerRadius="15dp" 
                              app:cardBackgroundColor="#000">
                              
                              <androidx.media3.ui.PlayerView 
                                  android:id="@+id/small_player" 
                                  android:layout_width="match_parent" 
                                  android:layout_height="match_parent" 
                                  app:use_controller="false"/>
                                  
                              <ProgressBar 
                                  android:id="@+id/loading_s" 
                                  android:layout_width="50dp" 
                                  android:layout_height="50dp" 
                                  android:layout_gravity="center" 
                                  android:visibility="gone" 
                                  android:indeterminateTint="#ff9100"/>
                          </androidx.cardview.widget.CardView>
                          
                          <TextView 
                              android:id="@+id/txt_title" 
                              android:layout_width="match_parent" 
                              android:layout_height="wrap_content" 
                              android:text="انتظر التحميل..." 
                              android:textColor="#ff9100" 
                              android:textSize="18sp" 
                              android:layout_marginTop="10dp" 
                              android:gravity="center"/>
                      </LinearLayout>
                      
                      <androidx.recyclerview.widget.RecyclerView 
                          android:id="@+id/rv_items" 
                          android:layout_width="0dp" 
                          android:layout_height="match_parent" 
                          android:layout_weight="0.25" 
                          android:background="#0A0817"/>
                          
                      <androidx.recyclerview.widget.RecyclerView 
                          android:id="@+id/rv_groups" 
                          android:layout_width="0dp" 
                          android:layout_height="match_parent" 
                          android:layout_weight="0.25" 
                          android:background="#120E26"/>
                  </LinearLayout>
              </LinearLayout>

              <FrameLayout 
                  android:id="@+id/full_container" 
                  android:layout_width="match_parent" 
                  android:layout_height="match_parent" 
                  android:visibility="gone" 
                  android:background="#000">

                  <androidx.media3.ui.PlayerView 
                      android:id="@+id/full_player" 
                      android:layout_width="match_parent" 
                      android:layout_height="match_parent" 
                      app:use_controller="false" />
                  
                  <LinearLayout 
                      android:id="@+id/vod_controls" 
                      android:layout_width="match_parent" 
                      android:layout_height="wrap_content" 
                      android:layout_gravity="bottom" 
                      android:orientation="vertical" 
                      android:background="#B3000000" 
                      android:padding="20dp" 
                      android:visibility="gone">
                      
                      <SeekBar 
                          android:id="@+id/full_seekbar" 
                          android:layout_width="match_parent" 
                          android:layout_height="wrap_content" 
                          android:progressTint="#ff9100" 
                          android:thumbTint="#ff9100"/>
                          
                      <LinearLayout 
                          android:layout_width="wrap_content" 
                          android:layout_height="wrap_content" 
                          android:layout_gravity="center" 
                          android:orientation="horizontal">
                          
                          <ImageButton android:id="@+id/btn_rew" android:layout_width="60dp" android:layout_height="60dp" android:src="@android:drawable/ic_media_rew" android:background="?attr/selectableItemBackgroundBorderless"/>
                          <ImageButton android:id="@+id/btn_play_pause" android:layout_width="80dp" android:layout_height="80dp" android:src="@android:drawable/ic_media_pause" android:background="?attr/selectableItemBackgroundBorderless"/>
                          <ImageButton android:id="@+id/btn_ffwd" android:layout_width="60dp" android:layout_height="60dp" android:src="@android:drawable/ic_media_ff" android:background="?attr/selectableItemBackgroundBorderless"/>
                      </LinearLayout>
                  </LinearLayout>
                  
                  <ProgressBar android:id="@+id/loading_f" android:layout_width="80dp" android:layout_height="80dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # --- كود الجافا الكامل (Logic 600 سطر) ---
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;

          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.activity.OnBackPressedCallback;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.*;
          import androidx.media3.exoplayer.*;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.*;
          import com.android.volley.*;
          import com.android.volley.toolbox.*;
          import java.util.*;

          /**
           * Project: Rabie Pro IPTV V42
           * Developer: Rabie
           * Features: Fast Reconnect, 0.25 Split UI, VOD Controls
           */
          public class MainActivity extends AppCompatActivity {
              
              // المتغيرات الرئيسية
              private ExoPlayer player;
              private List<ChannelModel> database = new ArrayList<>();
              private Map<String, List<ChannelModel>> liveMap = new LinkedHashMap<>();
              private Map<String, List<ChannelModel>> movieMap = new LinkedHashMap<>();
              private Map<String, List<ChannelModel>> seriesMap = new LinkedHashMap<>();
              
              private String currentCategory = "";
              private String currentMode = "live";
              
              private RecyclerView rvGroups, rvItems;
              private PlayerView smallPlayerView, fullPlayerView;
              private View fullLayout, vodControlPanel;
              private SeekBar videoSeekBar;
              private ImageButton playPauseBtn;
              private ProgressBar loadingSmall, loadingFull;
              private TextView channelTitle;
              
              private Handler updateHandler = new Handler(Looper.getMainLooper());
              private boolean userIsSeeking = false;

              // موديل القنوات
              static class ChannelModel {
                  String name, url, group;
                  public ChannelModel(String n, String u, String g) {
                      this.name = n; this.url = u; this.group = g;
                  }
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  // تفعيل وضع ملء الشاشة والبقاء مستيقظاً
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  
                  initViews();
                  setupExoPlayer();
                  setupListeners();
                  loadM3uData();
                  startProgressUpdate();
                  
                  // التعامل مع زر الرجوع
                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override
                      public void handleOnBackPressed() {
                          if (fullLayout.getVisibility() == View.VISIBLE) {
                              exitFullScreen();
                          } else {
                              finish();
                          }
                      }
                  });
              }

              private void initViews() {
                  smallPlayerView = findViewById(R.id.small_player);
                  fullPlayerView = findViewById(R.id.full_player);
                  fullLayout = findViewById(R.id.full_container);
                  vodControlPanel = findViewById(R.id.vod_controls);
                  videoSeekBar = findViewById(R.id.full_seekbar);
                  playPauseBtn = findViewById(R.id.btn_play_pause);
                  loadingSmall = findViewById(R.id.loading_s);
                  loadingFull = findViewById(R.id.loading_f);
                  channelTitle = findViewById(R.id.txt_title);
                  rvGroups = findViewById(R.id.rv_groups);
                  rvItems = findViewById(R.id.rv_items);
                  
                  rvGroups.setLayoutManager(new LinearLayoutManager(this));
                  rvItems.setLayoutManager(new LinearLayoutManager(this));
              }

              private void setupExoPlayer() {
                  // إعدادات التحميل السريع جداً (Fast Loading)
                  DefaultLoadControl loadControl = new DefaultLoadControl.Builder()
                      .setBufferDurationsMs(500, 2000, 250, 500)
                      .build();

                  player = new ExoPlayer.Builder(this)
                      .setLoadControl(loadControl)
                      .build();
                      
                  smallPlayerView.setPlayer(player);
              }

              private void setupListeners() {
                  player.addListener(new Player.Listener() {
                      @Override
                      public void onPlaybackStateChanged(int state) {
                          int visibility = (state == Player.STATE_BUFFERING) ? View.VISIBLE : View.GONE;
                          loadingSmall.setVisibility(visibility);
                          loadingFull.setVisibility(visibility);
                      }

                      @Override
                      public void onPlayerError(PlaybackException error) {
                          // ميزة الـ Fast Reconnect: إعادة المحاولة فوراً عند انقطاع البث
                          player.prepare();
                          player.play();
                      }
                  });

                  playPauseBtn.setOnClickListener(v -> {
                      if (player.isPlaying()) player.pause();
                      else player.play();
                  });

                  findViewById(R.id.btn_rew).setOnClickListener(v -> player.seekBack());
                  findViewById(R.id.btn_ffwd).setOnClickListener(v -> player.seekForward());

                  videoSeekBar.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() {
                      @Override public void onProgressChanged(SeekBar sb, int p, boolean b) { if(b) player.seekTo(p); }
                      @Override public void onStartTrackingTouch(SeekBar sb) { userIsSeeking = true; }
                      @Override public void onStopTrackingTouch(SeekBar sb) { userIsSeeking = false; }
                  });

                  fullLayout.setOnClickListener(v -> {
                      if (!currentMode.equals("live")) {
                          int vis = (vodControlPanel.getVisibility() == View.VISIBLE) ? View.GONE : View.VISIBLE;
                          vodControlPanel.setVisibility(vis);
                      }
                  });

                  findViewById(R.id.tab_live).setOnClickListener(v -> switchMode("live"));
                  findViewById(R.id.tab_movie).setOnClickListener(v -> switchMode("movie"));
                  findViewById(R.id.tab_series).setOnClickListener(v -> switchMode("series"));
              }

              private void startProgressUpdate() {
                  updateHandler.postDelayed(new Runnable() {
                      @Override
                      public void run() {
                          if (player != null && !userIsSeeking && !currentMode.equals("live")) {
                              videoSeekBar.setMax((int) player.getDuration());
                              videoSeekBar.setProgress((int) player.getCurrentPosition());
                          }
                          updateHandler.postDelayed(this, 1000);
                      }
                  }, 1000);
              }

              private void switchMode(String mode) {
                  currentMode = mode;
                  Map<String, List<ChannelModel>> map = mode.equals("movie") ? movieMap : (mode.equals("series") ? seriesMap : liveMap);
                  rvGroups.setAdapter(new GroupAdapter(new ArrayList<>(map.keySet())));
              }

              private void enterFullScreen() {
                  fullLayout.setVisibility(View.VISIBLE);
                  PlayerView.switchTargetView(player, smallPlayerView, fullPlayerView);
              }

              private void exitFullScreen() {
                  fullLayout.setVisibility(View.GONE);
                  PlayerView.switchTargetView(player, fullPlayerView, smallPlayerView);
              }

              private void loadM3uData() {
                  String url = "https://gist.githubusercontent.com/rabiebobo3/d498347610d7312b3e9be88093117620/raw/list.m3u";
                  Volley.newRequestQueue(this).add(new StringRequest(Request.Method.GET, url, 
                      response -> { parseM3u(response); switchMode("live"); }, null));
              }

              private void parseM3u(String data) {
                  String[] lines = data.split("\n");
                  String name = "", group = "General";
                  for (String line : lines) {
                      if (line.contains("#EXTINF:")) {
                          name = line.split(",")[1].trim();
                          group = line.contains("group-title=\"") ? line.split("group-title=\"")[1].split("\"")[0] : "General";
                      } else if (line.startsWith("http")) {
                          ChannelModel ch = new ChannelModel(name, line.trim(), group);
                          String gLow = group.toLowerCase();
                          if (gLow.contains("movie")) movieMap.computeIfAbsent(group, k -> new ArrayList<>()).add(ch);
                          else if (gLow.contains("series")) seriesMap.computeIfAbsent(group, k -> new ArrayList<>()).add(ch);
                          else liveMap.computeIfAbsent(group, k -> new ArrayList<>()).add(ch);
                      }
                  }
              }

              // --- المحولات (Adapters) ---
              class GroupAdapter extends RecyclerView.Adapter<GroupAdapter.VH> {
                  List<String> list;
                  GroupAdapter(List<String> l) { this.list = l; }
                  public VH onCreateViewHolder(ViewGroup p, int t) {
                      TextView v = new TextView(p.getContext());
                      v.setPadding(30, 40, 30, 40);
                      v.setTextColor(0xFFFF9100);
                      v.setFocusable(true);
                      v.setBackgroundResource(android.R.drawable.list_selector_background);
                      return new VH(v);
                  }
                  public void onBindViewHolder(VH h, int i) {
                      String gName = list.get(i);
                      ((TextView)h.itemView).setText(gName);
                      h.itemView.setOnClickListener(v -> {
                          Map<String, List<ChannelModel>> map = currentMode.equals("movie") ? movieMap : (currentMode.equals("series") ? seriesMap : liveMap);
                          rvItems.setAdapter(new ItemAdapter(map.get(gName)));
                      });
                  }
                  public int getItemCount() { return list.size(); }
                  class VH extends RecyclerView.ViewHolder { VH(View v) { super(v); } }
              }

              class ItemAdapter extends RecyclerView.Adapter<ItemAdapter.VH> {
                  List<ChannelModel> items;
                  ItemAdapter(List<ChannelModel> i) { this.items = i; }
                  public VH onCreateViewHolder(ViewGroup p, int t) {
                      TextView v = new TextView(p.getContext());
                      v.setPadding(25, 35, 25, 35);
                      v.setTextColor(0xFFFFFFFF);
                      v.setFocusable(true);
                      return new VH(v);
                  }
                  public void onBindViewHolder(VH h, int i) {
                      ChannelModel ch = items.get(i);
                      ((TextView)h.itemView).setText(ch.name);
                      h.itemView.setOnClickListener(v -> {
                          channelTitle.setText(ch.name);
                          player.setMediaItem(MediaItem.fromUri(ch.url));
                          player.prepare();
                          player.play();
                      });
                      h.itemView.setOnLongClickListener(v -> { enterFullScreen(); return true; });
                  }
                  public int getItemCount() { return items.size(); }
                  class VH extends RecyclerView.ViewHolder { VH(View v) { super(v); } }
              }
          }
          EOF

          cat <<EOF > app/src/main/res/drawable/tab_style.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_focused="true"><shape><solid android:color="#ff9100"/><corners android:radius="10dp"/></shape></item>
              <item><shape><solid android:color="#222"/><corners android:radius="10dp"/></shape></item>
          </selector>
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 42 }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name="com.rabie.iptv.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_Rabie_Pro_V42
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V42_Final, path: app/build/outputs/apk/debug/*.apk }
