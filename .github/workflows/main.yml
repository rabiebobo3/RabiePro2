name: Rabie_New_Start
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Create_And_Build
        run: |
          # 1. صنع المجلدات
          mkdir -p app/src/main/java/com/rabie/newapp app/src/main/res/layout
          
          # 2. ملف الإعدادات
          echo "rootProject.name = 'RabieNew'; include ':app'" > settings.gradle
          
          # 3. ملف البناء (Gradle)
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.2' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.newapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.newapp"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          # 4. المانيفست وكود الجافا
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Rabie New"><activity android:name="com.rabie.newapp.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          echo 'package com.rabie.newapp; import android.app.Activity; import android.os.Bundle; public class MainActivity extends Activity { @Override protected void onCreate(Bundle s) { super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText("Success on New Repo!"); setContentView(t); } }' > app/src/main/java/com/rabie/newapp/MainActivity.java
          
          # 5. البناء
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download_Link
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_New_APK
          path: app/build/outputs/apk/debug/*.apk
