name: Rabie_Ultimate_Success
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Pure_Android
        run: |
          # تنظيف شامل
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/rabie/finalapp
          
          # ملف الإعدادات الأساسي
          echo "rootProject.name = 'RabieFinal'; include ':app'" > settings.gradle
          
          # ملف بناء التطبيق (بدون مكتبات Material المعقدة)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.rabie.finalapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.finalapp"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # المانيفست (نسخة خفيفة)
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Rabie App"><activity android:name="com.rabie.finalapp.MainActivity" android:theme="@style/Theme.AppCompat.Light" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          
          # كود الجافا
          echo 'package com.rabie.finalapp; import android.app.Activity; import android.os.Bundle; public class MainActivity extends Activity { @Override protected void onCreate(Bundle s) { super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText("Rabie Success ✅"); setContentView(t); } }' > app/src/main/java/com/rabie/finalapp/MainActivity.java
          
          # البناء القسري
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Export_APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_Success_APK
          path: app/build/outputs/apk/debug/*.apk
