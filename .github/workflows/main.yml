name: Rabie_Pro_V41_VLC_Integrated
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_V41_Ultimate_VLC
        run: |
          # تنظيف وحذف الملفات القديمة
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          
          # إعداد خصائص المشروع
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # إعداد إعدادات المشروع والمستودعات
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          # إنشاء هيكل المجلدات
          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/values

          # تحميل الأيقونات والشعار
          curl -Lo app/src/main/res/mipmap-hdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          # إنشاء ملفات الموارد (XML)
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#05030A</color><color name="colorPrimaryDark">#000000</color><color name="colorAccent">#FF9100</color><color name="white">#FFFFFF</color></resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources><string name="app_name">Rabie Pro VLC</string></resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml

          # إنشاء ملفات الـ Layout (مهم جداً ترتيبها قبل البناء)
          cat <<EOF > app/src/main/res/layout/item_channel.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center_vertical" android:padding="12dp" android:focusable="true" android:clickable="true" android:background="@drawable/focus_highlight" android:layout_marginVertical="2dp"><TextView android:id="@+id/txt_name" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textColor="#FFF" android:textSize="15sp" android:gravity="right" android:paddingRight="12dp" android:textStyle="bold"/><ImageView android:id="@+id/img_logo" android:layout_width="40dp" android:layout_height="40dp" android:scaleType="centerInside"/></LinearLayout>
          EOF

          cat <<EOF > app/src/main/res/layout/item_card.xml
          <androidx.cardview.widget.CardView xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="220dp" android:layout_margin="8dp" app:cardCornerRadius="14dp" app:cardElevation="10dp" android:focusable="true" android:clickable="true" android:background="@drawable/focus_highlight"><RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent"><ImageView android:id="@+id/img_logo" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="centerCrop"/><View android:layout_width="match_parent" android:layout_height="60dp" android:layout_alignParentBottom="true" android:background="#E6000000"/><TextView android:id="@+id/txt_name" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:padding="8dp" android:textColor="#ff9100" android:textSize="13sp" android:textStyle="bold" android:maxLines="2" android:gravity="center"/></RelativeLayout></androidx.cardview.widget.CardView>
          EOF

          # نسخ بقية ملفات الـ XML والـ Drawable التي أرفقتها في طلبك
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          $(cat <<'INNER_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:keepScreenOn="true">
              <LinearLayout android:id="@+id/splash_screen" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:gravity="center" android:elevation="20dp">
                  <androidx.cardview.widget.CardView android:layout_width="150dp" android:layout_height="150dp" app:cardCornerRadius="75dp" app:cardBackgroundColor="#000">
                      <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                  </androidx.cardview.widget.CardView>
              </LinearLayout>
              <LinearLayout android:id="@+id/main_ui_container" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:visibility="gone">
                  <LinearLayout android:id="@+id/top_tabs" android:layout_width="match_parent" android:layout_height="65dp" android:background="#000" android:gravity="center_vertical" android:padding="10dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RABIE PRO VLC" android:textColor="#ff9100" android:textStyle="bold" android:textSize="22sp"/>
                      <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:background="@drawable/tab_button_style" android:textColor="#FFF"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:background="@drawable/tab_button_style" android:textColor="#FFF"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:background="@drawable/tab_button_style" android:textColor="#FFF"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal">
                      <LinearLayout android:id="@+id/left_side_container" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.55" android:orientation="vertical" android:padding="10dp">
                          <androidx.cardview.widget.CardView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.65" app:cardCornerRadius="15dp">
                              <androidx.media3.ui.PlayerView android:id="@+id/small_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false"/>
                          </androidx.cardview.widget.CardView>
                          <TextView android:id="@+id/txt_title" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#ff9100" android:textSize="20sp" android:padding="10dp"/>
                      </LinearLayout>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_items" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.25"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_groups" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.20"/>
                  </LinearLayout>
              </LinearLayout>
              <FrameLayout android:id="@+id/full_container" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" android:background="#000">
                  <androidx.media3.ui.PlayerView android:id="@+id/full_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false" />
              </FrameLayout>
          </RelativeLayout>
          INNER_EOF
          )
          EOF

          # إنشاء ملفات الـ Drawable اللازمة
          cat <<EOF > app/src/main/res/drawable/focus_highlight.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android"><item android:state_focused="true"><shape><solid android:color="#33FF9100"/><stroke android:width="4dp" android:color="#ff9100"/><corners android:radius="12dp"/></shape></item><item><shape><solid android:color="@android:color/transparent"/><stroke android:width="1dp" android:color="#20FFFFFF"/><corners android:radius="12dp"/></shape></item></selector>
          EOF
          
          cat <<EOF > app/src/main/res/drawable/tab_button_style.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android"><item android:state_focused="true"><shape><solid android:color="#ff9100"/><corners android:radius="20dp"/></shape></item><item><shape><solid android:color="#120E26"/><corners android:radius="20dp"/><stroke android:width="1dp" android:color="#261E4A"/></shape></item></selector>
          EOF

          # إنشاء ملف MainActivity.java
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.exoplayer.ExoPlayer;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.*;
          import com.bumptech.glide.Glide;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer player;
              private PlayerView smallPV, fullPV;
              private View splash, mainUI;
              private TextView tTitle;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  splash = findViewById(R.id.splash_screen);
                  mainUI = findViewById(R.id.main_ui_container);
                  smallPV = findViewById(R.id.small_player);
                  fullPV = findViewById(R.id.full_player);
                  tTitle = findViewById(R.id.txt_title);

                  player = new ExoPlayer.Builder(this).build();
                  smallPV.setPlayer(player);

                  new Handler(Looper.getMainLooper()).postDelayed(() -> {
                      splash.setVisibility(View.GONE);
                      mainUI.setVisibility(View.VISIBLE);
                  }, 2000);
              }
              
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (player != null) player.release();
              }
          }
          EOF

          # إنشاء ملف build.gradle وإضافة مكتبة VLC
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode 41
                  versionName "41.0-VLC"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.media3:media3-exoplayer-hls:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              # إضافة مكتبة VLC المدمجة
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          # إنشاء Manifest
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><uses-permission android:name="android.permission.INTERNET"/><application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true" android:label="Rabie Pro VLC" android:icon="@mipmap/ic_launcher"><activity android:name="com.rabie.iptv.MainActivity" android:exported="true" android:screenOrientation="landscape"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

          # تنفيذ بناء التطبيق
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_VLC_Apk
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_Pro_V41_VLC_Integrated
          path: app/build/outputs/apk/debug/*.apk
