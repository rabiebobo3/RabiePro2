name: Rabie_Pro_V41_VLC_Internal
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Build_V41_Ultimate_With_Internal_VLC
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF
          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/values
          curl -Lo app/src/main/res/mipmap-hdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
          <color name="colorPrimary">#05030A</color>
          <color name="colorPrimaryDark">#000000</color>
          <color name="colorAccent">#FF9100</color>
          <color name="white">#FFFFFF</color>
          </resources>
          EOF
          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
          <string name="app_name">Rabie Pro</string>
          </resources>
          EOF
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml
          
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#05030A"
              android:keepScreenOn="true">
              <LinearLayout android:id="@+id/splash_screen" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:gravity="center" android:elevation="20dp">
                  <androidx.cardview.widget.CardView android:layout_width="150dp" android:layout_height="150dp" app:cardCornerRadius="75dp" app:cardBackgroundColor="#000">
                      <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                  </androidx.cardview.widget.CardView>
              </LinearLayout>
              <LinearLayout android:id="@+id/main_ui_container" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:visibility="gone">
                  <LinearLayout android:id="@+id/top_tabs" android:layout_width="match_parent" android:layout_height="65dp" android:background="#000" android:gravity="center_vertical" android:padding="10dp">
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RABIE PRO" android:textColor="#ff9100" android:textStyle="bold" android:textSize="22sp" android:layout_marginRight="20dp"/>
                      <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:textColor="#EEE" android:background="@drawable/tab_button_style"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:textColor="#EEE" android:background="@drawable/tab_button_style"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:textColor="#EEE" android:background="@drawable/tab_button_style"/>
                      <Button android:id="@+id/tab_player_settings" android:layout_width="wrap_content" android:layout_height="42dp" android:text="تغيير المشغل" android:textColor="#FFF" android:background="@drawable/tab_button_style"/>
                  </LinearLayout>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal">
                      <LinearLayout android:id="@+id/left_side_container" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.55" android:orientation="vertical" android:padding="10dp">
                          <androidx.cardview.widget.CardView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.65" app:cardCornerRadius="15dp" app:cardBackgroundColor="#000">
                              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent">
                                  <androidx.media3.ui.PlayerView android:id="@+id/small_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false"/>
                                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_layout_small" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" />
                              </FrameLayout>
                              <ProgressBar android:id="@+id/loading_s" android:layout_width="50dp" android:layout_height="50dp" android:layout_gravity="center" android:visibility="gone"/>
                          </androidx.cardview.widget.CardView>
                          <TextView android:id="@+id/txt_title" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#ff9100" android:textSize="20sp" android:layout_marginTop="10dp" android:gravity="center"/>
                      </LinearLayout>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_items" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.25" android:background="#0A0817"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_groups" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.20" android:background="#120E26"/>
                  </LinearLayout>
              </LinearLayout>
              <FrameLayout android:id="@+id/full_container" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" android:background="#000">
                  <androidx.media3.ui.PlayerView android:id="@+id/full_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false" />
                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_layout_full" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" />
                  <ProgressBar android:id="@+id/loading_f" android:layout_width="80dp" android:layout_height="80dp" android:layout_gravity="center" android:visibility="gone"/>
                  <LinearLayout android:id="@+id/overlay_full" android:layout_width="match_parent" android:layout_height="match_parent" android:gravity="bottom" android:visibility="gone">
                     <TextView android:id="@+id/full_ch_name" android:layout_width="match_parent" android:layout_height="wrap_content" android:background="#B3000000" android:textColor="#FFF" android:padding="20dp" android:textSize="24sp"/>
                  </LinearLayout>
              </FrameLayout>
          </RelativeLayout>
          EOF

          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.activity.OnBackPressedCallback;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.*;
          import androidx.media3.exoplayer.*;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.*;
          import com.android.volley.*;
          import com.android.volley.toolbox.*;
          import com.bumptech.glide.Glide;
          import com.google.gson.Gson;
          import com.google.gson.reflect.TypeToken;
          import java.util.*;
          import org.videolan.libvlc.LibVLC;
          import org.videolan.libvlc.Media;
          import org.videolan.libvlc.MediaPlayer;
          import org.videolan.libvlc.util.VLCVideoLayout;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer exoPlayer;
              private LibVLC libVlc;
              private MediaPlayer vlcPlayer;
              private VLCVideoLayout vlcLayoutSmall, vlcLayoutFull;
              
              private List<Ch> database = new ArrayList<>();
              private Map<String, List<Ch>> live = new LinkedHashMap<>(), movie = new LinkedHashMap<>(), series = new LinkedHashMap<>();
              private List<Ch> currentItems = new ArrayList<>();
              private String currentCat = "", currentMode = "live";
              private Ch currentCh;
              private RecyclerView rvG, rvI;
              private TextView tTitle, tFullChName;
              private PlayerView smallPV, fullPV;
              private View mainUI, fullCont, splash, overlay;
              private ProgressBar ps, pf;
              private boolean useVlcInternal = false;

              static class Ch { String n, u, g, l, id, pid, isF; }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  
                  useVlcInternal = getSharedPreferences("settings", MODE_PRIVATE).getBoolean("use_vlc_int", false);
                  
                  initViews();
                  initExo();
                  initVlc();
                  
                  loadData();
                  
                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override public void handleOnBackPressed() {
                          if (fullCont.getVisibility() == View.VISIBLE) toggleFull(false);
                          else finish();
                      }
                  });
              }

              private void initViews() {
                  splash = findViewById(R.id.splash_screen);
                  mainUI = findViewById(R.id.main_ui_container);
                  smallPV = findViewById(R.id.small_player);
                  fullPV = findViewById(R.id.full_player);
                  vlcLayoutSmall = findViewById(R.id.vlc_layout_small);
                  vlcLayoutFull = findViewById(R.id.vlc_layout_full);
                  fullCont = findViewById(R.id.full_container);
                  tTitle = findViewById(R.id.txt_title);
                  tFullChName = findViewById(R.id.full_ch_name);
                  ps = findViewById(R.id.loading_s);
                  pf = findViewById(R.id.loading_f);
                  rvG = findViewById(R.id.rv_groups);
                  rvI = findViewById(R.id.rv_items);
                  overlay = findViewById(R.id.overlay_full);

                  findViewById(R.id.tab_live).setOnClickListener(v -> setMode("live"));
                  findViewById(R.id.tab_movie).setOnClickListener(v -> setMode("movie"));
                  findViewById(R.id.tab_series).setOnClickListener(v -> setMode("series"));
                  findViewById(R.id.tab_player_settings).setOnClickListener(v -> showPlayerDialog());
                  fullCont.setOnClickListener(v -> {
                      overlay.setVisibility(View.VISIBLE);
                      new Handler().postDelayed(() -> overlay.setVisibility(View.GONE), 3000);
                  });

                  new Handler().postDelayed(() -> {
                      splash.setVisibility(View.GONE);
                      mainUI.setVisibility(View.VISIBLE);
                  }, 2000);
              }

              private void initExo() {
                  exoPlayer = new ExoPlayer.Builder(this).build();
                  smallPV.setPlayer(exoPlayer);
                  exoPlayer.addListener(new Player.Listener() {
                      public void onPlaybackStateChanged(int s) {
                          int v = (s == Player.STATE_BUFFERING) ? View.VISIBLE : View.GONE;
                          ps.setVisibility(v); pf.setVisibility(v);
                      }
                  });
              }

              private void initVlc() {
                  ArrayList<String> options = new ArrayList<>();
                  options.add("--rtsp-tcp");
                  options.add("--network-caching=3000");
                  libVlc = new LibVLC(this, options);
                  vlcPlayer = new MediaPlayer(libVlc);
              }

              private void showPlayerDialog() {
                  String[] items = {"ExoPlayer (سريع)", "VLC Internal (أكثر توافقاً)"};
                  new AlertDialog.Builder(this)
                      .setTitle("اختر المحرك الداخلي")
                      .setSingleChoiceItems(items, useVlcInternal ? 1 : 0, (d, w) -> {
                          useVlcInternal = (w == 1);
                          getSharedPreferences("settings", MODE_PRIVATE).edit().putBoolean("use_vlc_int", useVlcInternal).apply();
                          Toast.makeText(this, "تم تغيير المشغل، ابدأ التشغيل الآن", Toast.LENGTH_SHORT).show();
                          d.dismiss();
                      }).show();
              }

              private void playChannel(Ch c) {
                  currentCh = c;
                  tTitle.setText(c.n);
                  tFullChName.setText(c.n);
                  
                  // إيقاف المشغلين أولاً
                  exoPlayer.stop();
                  vlcPlayer.stop();

                  if (useVlcInternal) {
                      smallPV.setVisibility(View.GONE);
                      vlcLayoutSmall.setVisibility(View.VISIBLE);
                      vlcPlayer.attachViews(vlcLayoutSmall, null, false, false);
                      Media media = new Media(libVlc, Uri.parse(c.u));
                      vlcPlayer.setMedia(media);
                      vlcPlayer.play();
                  } else {
                      vlcLayoutSmall.setVisibility(View.GONE);
                      smallPV.setVisibility(View.VISIBLE);
                      exoPlayer.setMediaItem(MediaItem.fromUri(c.u));
                      exoPlayer.prepare();
                      exoPlayer.play();
                  }
              }

              private void toggleFull(boolean full) {
                  if (full) {
                      mainUI.setVisibility(View.GONE);
                      fullCont.setVisibility(View.VISIBLE);
                      if (useVlcInternal) {
                          fullPV.setVisibility(View.GONE);
                          vlcLayoutFull.setVisibility(View.VISIBLE);
                          vlcPlayer.detachViews();
                          vlcPlayer.attachViews(vlcLayoutFull, null, false, false);
                      } else {
                          vlcLayoutFull.setVisibility(View.GONE);
                          fullPV.setVisibility(View.VISIBLE);
                          PlayerView.switchTargetView(exoPlayer, smallPV, fullPV);
                      }
                  } else {
                      fullCont.setVisibility(View.GONE);
                      mainUI.setVisibility(View.VISIBLE);
                      if (useVlcInternal) {
                          vlcPlayer.detachViews();
                          vlcPlayer.attachViews(vlcLayoutSmall, null, false, false);
                      } else {
                          PlayerView.switchTargetView(exoPlayer, fullPV, smallPV);
                      }
                  }
              }

              private void setMode(String m) {
                  currentMode = m;
                  rvG.setLayoutManager(new LinearLayoutManager(this));
                  rvI.setLayoutManager(m.equals("live") ? new LinearLayoutManager(this) : new GridLayoutManager(this, 5));
                  Map<String, List<Ch>> d = m.equals("movie") ? movie : (m.equals("series") ? series : live);
                  List<String> groups = new ArrayList<>(d.keySet());
                  rvG.setAdapter(new GroupAdapter(groups));
                  if (!groups.isEmpty()) { currentCat = groups.get(0); renderItems(); }
              }

              private void renderItems() {
                  currentItems.clear();
                  Map<String, List<Ch>> d = currentMode.equals("movie") ? movie : (currentMode.equals("series") ? series : live);
                  if (d.containsKey(currentCat)) currentItems.addAll(d.get(currentCat));
                  rvI.setAdapter(new ItemAdapter(currentItems));
              }

              private void loadData() {
                  String url = "https://gist.githubusercontent.com/rabiebobo3/d498347610d7312b3e9be88093117620/raw/list.m3u";
                  Volley.newRequestQueue(this).add(new StringRequest(Request.Method.GET, url, res -> {
                      parse(res);
                      setMode("live");
                  }, null));
              }

              private void parse(String text) {
                  String[] lines = text.split("\n"); Ch cur = null;
                  for (String l : lines) {
                      if (l.contains("#EXTINF:")) {
                          cur = new Ch();
                          cur.n = l.split(",").length > 1 ? l.split(",")[1].trim() : "Unknown";
                          cur.g = l.contains("group-title=\"") ? l.split("group-title=\"")[1].split("\"")[0] : "General";
                          cur.l = l.contains("tvg-logo=\"") ? l.split("tvg-logo=\"")[1].split("\"")[0] : "";
                      } else if (l.trim().startsWith("http") && cur != null) {
                          cur.u = l.trim();
                          String g = cur.g.toLowerCase();
                          if (g.contains("movie")) movie.computeIfAbsent(cur.g, k->new ArrayList<>()).add(cur);
                          else if (g.contains("series")) series.computeIfAbsent(cur.g, k->new ArrayList<>()).add(cur);
                          else live.computeIfAbsent(cur.g, k->new ArrayList<>()).add(cur);
                          cur = null;
                      }
                  }
              }

              @Override protected void onDestroy() {
                  super.onDestroy();
                  exoPlayer.release();
                  vlcPlayer.release();
                  libVlc.release();
              }

              class GroupAdapter extends RecyclerView.Adapter<GroupAdapter.VH> {
                  List<String> g; GroupAdapter(List<String> g) { this.g = g; }
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_channel, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      h.n.setText(g.get(i));
                      h.itemView.setOnClickListener(v -> { currentCat = g.get(i); renderItems(); });
                  }
                  public int getItemCount() { return g.size(); }
                  class VH extends RecyclerView.ViewHolder { TextView n; VH(View v) { super(v); n = v.findViewById(R.id.txt_name); } }
              }

              class ItemAdapter extends RecyclerView.Adapter<ItemAdapter.VH> {
                  List<Ch> items; ItemAdapter(List<Ch> i) { items = i; }
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(currentMode.equals("live")?R.layout.item_channel:R.layout.item_card, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      Ch c = items.get(i); h.n.setText(c.n); Glide.with(h.itemView).load(c.l).into(h.img);
                      h.itemView.setOnClickListener(v -> playChannel(c));
                      h.itemView.setOnLongClickListener(v -> { toggleFull(true); return true; });
                  }
                  public int getItemCount() { return items.size(); }
                  class VH extends RecyclerView.ViewHolder { TextView n; ImageView img; VH(View v) { super(v); n = v.findViewById(R.id.txt_name); img = v.findViewById(R.id.img_logo); } }
              }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 41; versionName "41.0" }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              // إضافة مكتبة VLC الداخلية
              implementation 'org.videolan.android:libvlc-all:3.6.0-eap11'
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true" android:label="@string/app_name" android:icon="@mipmap/ic_launcher">
                  <activity android:name="com.rabie.iptv.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          cat <<EOF > app/src/main/res/drawable/tab_button_style.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
          <item android:state_focused="true"><shape><solid android:color="#ff9100"/><corners android:radius="10dp"/></shape></item>
          <item><shape><solid android:color="#120E26"/><corners android:radius="10dp"/></shape></item>
          </selector>
          EOF

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_V41_Apk
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_Pro_V41_Internal_VLC
          path: app/build/outputs/apk/debug/*.apk
