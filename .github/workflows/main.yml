name: Rabie_Pro_V42_Final_Auto_Reload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Final_Professional_Stall_Fixed
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # تعديل المستودعات لضمان تحميل Gson و Media3
          cat <<EOF > settings.gradle
          pluginManagement { 
              repositories { 
                  google()
                  mavenCentral()
                  gradlePluginPortal() 
              } 
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { 
                  google()
                  mavenCentral() 
                  maven { url "https://jitpack.io" } 
              }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/values
          
          curl -Lo app/src/main/res/mipmap-hdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#05030A</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorAccent">#FF9100</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Rabie Pro V42</string>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent" 
              android:background="#05030A" android:keepScreenOn="true">
              
              <LinearLayout android:id="@+id/splash_screen" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:gravity="center" android:elevation="20dp">
                  <androidx.cardview.widget.CardView android:layout_width="150dp" android:layout_height="150dp" app:cardCornerRadius="75dp" app:cardBackgroundColor="#000" app:cardElevation="0dp">
                      <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                  </androidx.cardview.widget.CardView>
              </LinearLayout>

              <LinearLayout android:id="@+id/main_ui_container" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:visibility="gone">
                  <LinearLayout android:id="@+id/top_tabs" android:layout_width="match_parent" android:layout_height="65dp" android:background="#000" android:gravity="center_vertical" android:padding="10dp">
                      <androidx.cardview.widget.CardView android:layout_width="45dp" android:layout_height="45dp" app:cardCornerRadius="22.5dp" app:cardBackgroundColor="#000" android:layout_marginRight="10dp">
                          <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                      </androidx.cardview.widget.CardView>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RABIE PRO" android:textColor="#ff9100" android:textStyle="bold" android:textSize="22sp" android:layout_marginRight="20dp"/>
                      <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/tab_fav" android:layout_width="55dp" android:layout_height="42dp" android:text="⭐" android:textColor="#ff9100" android:textSize="16sp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal" android:baselineAligned="false">
                      <LinearLayout android:id="@+id/left_side_container" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.55" android:orientation="vertical" android:padding="10dp">
                          <androidx.cardview.widget.CardView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.65" app:cardCornerRadius="15dp" app:cardBackgroundColor="#000" app:cardElevation="12dp">
                              <androidx.media3.ui.PlayerView android:id="@+id/small_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false"/>
                              <ProgressBar android:id="@+id/loading_s" android:layout_width="50dp" android:layout_height="50dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
                          </androidx.cardview.widget.CardView>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.35" android:padding="20dp" android:layout_marginTop="10dp" android:background="@drawable/tab_button_style" android:orientation="vertical">
                              <TextView android:id="@+id/txt_title" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="اختر محتوى" android:textColor="#ff9100" android:textSize="20sp" android:textStyle="bold" android:maxLines="1"/>
                              <Button android:id="@+id/btn_toggle_fav" android:layout_width="wrap_content" android:layout_height="42dp" android:text="⭐ إضافة للمفضلة" android:layout_marginTop="15dp" android:focusable="true" android:background="@drawable/focus_highlight" android:paddingHorizontal="25dp" android:textColor="#FFF"/>
                          </LinearLayout>
                      </LinearLayout>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_items" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.25" android:background="#0A0817" android:focusable="true" android:nextFocusUp="@+id/top_tabs"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_groups" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.20" android:background="#120E26" android:focusable="true" android:nextFocusUp="@+id/top_tabs"/>
                  </LinearLayout>
              </LinearLayout>

              <FrameLayout android:id="@+id/full_container" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" android:background="#000" android:focusable="true" android:clickable="true">
                  <androidx.media3.ui.PlayerView android:id="@+id/full_player" android:layout_width="match_parent" android:layout_height="match_parent" app:resize_mode="fill" app:use_controller="false" />
                  <LinearLayout android:id="@+id/overlay_full" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="bottom" android:visibility="gone">
                      <LinearLayout android:id="@+id/infobar_layout" android:layout_width="match_parent" android:layout_height="wrap_content" android:background="#E6000000" android:orientation="horizontal" android:padding="15dp" android:gravity="center_vertical">
                          <androidx.cardview.widget.CardView android:layout_width="60dp" android:layout_height="60dp" app:cardCornerRadius="30dp" app:cardBackgroundColor="#000" android:layout_marginRight="15dp">
                              <circleimage.CircleImageView android:id="@+id/full_ch_logo" android:layout_width="match_parent" android:layout_height="match_parent"/>
                          </androidx.cardview.widget.CardView>
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical">
                              <TextView android:id="@+id/full_ch_name" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#ff9100" android:textSize="22sp" android:textStyle="bold"/>
                          </LinearLayout>
                          <ImageButton android:id="@+id/btn_dlna" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/ic_menu_share" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                          <ImageButton android:id="@+id/full_fav_btn" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/btn_star_big_off" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                          <androidx.mediarouter.app.MediaRouteButton android:id="@+id/media_route_button" android:layout_width="50dp" android:layout_height="50dp" android:focusable="true" android:background="@drawable/round_btn"/>
                      </LinearLayout>
                      <LinearLayout android:id="@+id/vod_controls" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="#B3000000" android:padding="15dp" android:gravity="center">
                          <SeekBar android:id="@+id/full_seekbar" android:layout_width="match_parent" android:layout_height="wrap_content" android:progressTint="#ff9100" android:thumbTint="#ff9100" android:focusable="true"/>
                          <RelativeLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                               <TextView android:id="@+id/txt_time" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="00:00 / 00:00" android:textColor="#FFF" android:textSize="14sp" android:layout_centerVertical="true"/>
                               <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_centerInParent="true">
                                  <ImageButton android:id="@+id/btn_prev_item" android:layout_width="45dp" android:layout_height="45dp" android:src="@android:drawable/ic_media_previous" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_rew" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/ic_media_rew" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_play_pause" android:layout_width="65dp" android:layout_height="65dp" android:src="@android:drawable/ic_media_pause" android:background="@drawable/round_btn_orange" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_ffwd" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/ic_media_ff" android:background="@drawable/round_btn" android:layout_marginLeft="10dp" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_next_item" android:layout_width="45dp" android:layout_height="45dp" android:src="@android:drawable/ic_media_next" android:background="@drawable/round_btn" android:layout_marginLeft="10dp" android:focusable="true"/>
                               </LinearLayout>
                          </RelativeLayout>
                      </LinearLayout>
                  </LinearLayout>
                  <ProgressBar android:id="@+id/loading_f" android:layout_width="80dp" android:layout_height="80dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # تم تحديث الكود الأصلي مع تحسين الـ Focus والـ Buffer
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;

          import android.content.Context;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.Window;
          import android.widget.ImageButton;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.SeekBar;
          import android.widget.TextView;
          import androidx.activity.OnBackPressedCallback;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.MediaItem;
          import androidx.media3.common.PlaybackException;
          import androidx.media3.common.Player;
          import androidx.media3.exoplayer.DefaultLoadControl;
          import androidx.media3.exoplayer.ExoPlayer;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.GridLayoutManager;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;
          import com.android.volley.Request;
          import com.android.volley.toolbox.StringRequest;
          import com.android.volley.toolbox.Volley;
          import com.bumptech.glide.Glide;
          import com.google.gson.Gson;
          import com.google.gson.reflect.TypeToken;
          import java.util.ArrayList;
          import java.util.LinkedHashMap;
          import java.util.List;
          import java.util.Map;
          import java.util.Stack;
          import com.google.android.gms.cast.framework.*;
          import androidx.mediarouter.app.MediaRouteButton;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer player;
              private PlayerView smallPlayerView, fullPlayerView;
              private List<Channel> database = new ArrayList<>();
              private Map<String, List<Channel>> liveData = new LinkedHashMap<>(), movieData = new LinkedHashMap<>(), seriesData = new LinkedHashMap<>();
              private List<Channel> favoriteList = new ArrayList<>(), currentItems = new ArrayList<>();
              private Stack<String> historyStack = new Stack<>();
              private String currentParentId = "root", currentCategory = "", currentMode = "live";
              private Channel currentChannel;
              private RecyclerView rvGroups, rvItems;
              private TextView txtTitle, txtTime, tFullChName;
              private View mainUiContainer, fullContainer, overlayFull, vodControls, splashScreen, leftSideContainer;
              private ImageView fullChannelLogo, fullFavBtn;
              private SeekBar seekBar;
              private ProgressBar loadingSmall, loadingFull;
              private ImageButton btnPlayPause, btnRewind, btnForward, btnNext, btnPrev, btnCast;
              private Handler handler = new Handler(Looper.getMainLooper());
              private long lastClickTime = 0, lastPlaybackPosition = -1;
              private int savedItemIndex = -1, stallCounter = 0;

              static class Channel { String n, u, g, l, id, pid, isF; }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  supportRequestWindowFeature(Window.FEATURE_NO_TITLE);
                  setContentView(R.layout.activity_main);
                  hideSystemUI();

                  CastButtonFactory.setUpMediaRouteButton(getApplicationContext(), findViewById(R.id.media_route_button));
                  splashScreen = findViewById(R.id.splash_screen);
                  mainUiContainer = findViewById(R.id.main_ui_container);
                  leftSideContainer = findViewById(R.id.left_side_container);
                  fullChannelLogo = findViewById(R.id.full_ch_logo);
                  tFullChName = findViewById(R.id.full_ch_name);
                  fullFavBtn = findViewById(R.id.full_fav_btn);
                  btnCast = findViewById(R.id.btn_dlna);

                  handler.postDelayed(() -> { splashScreen.setVisibility(View.GONE); mainUiContainer.setVisibility(View.VISIBLE); }, 2000);

                  // تحسين الـ Buffer لأجهزة TV
                  DefaultLoadControl loadControl = new DefaultLoadControl.Builder()
                          .setBufferDurationsMs(15000, 50000, 2500, 5000).build();

                  player = new ExoPlayer.Builder(this).setLoadControl(loadControl).build();
                  smallPlayerView = findViewById(R.id.small_player);
                  fullPlayerView = findViewById(R.id.full_player);
                  fullContainer = findViewById(R.id.full_container);
                  overlayFull = findViewById(R.id.overlay_full);
                  txtTime = findViewById(R.id.txt_time);
                  seekBar = findViewById(R.id.full_seekbar);
                  vodControls = findViewById(R.id.vod_controls);
                  loadingSmall = findViewById(R.id.loading_s);
                  loadingFull = findViewById(R.id.loading_f);
                  btnPlayPause = findViewById(R.id.btn_play_pause);
                  btnRewind = findViewById(R.id.btn_rew);
                  btnForward = findViewById(R.id.btn_ffwd);
                  btnNext = findViewById(R.id.btn_next_item);
                  btnPrev = findViewById(R.id.btn_prev_item);

                  smallPlayerView.setPlayer(player);
                  player.addListener(new Player.Listener() {
                      @Override
                      public void onPlaybackStateChanged(int state) {
                          int visibility = (state == Player.STATE_BUFFERING) ? View.VISIBLE : View.GONE;
                          loadingSmall.setVisibility(visibility); loadingFull.setVisibility(visibility);
                          if (state == Player.STATE_READY) { lastPlaybackPosition = -1; stallCounter = 0; saveCurrentPosition(); }
                      }
                      @Override public void onPlayerError(PlaybackException error) { forcePlayerReload(); }
                      @Override public void onIsPlayingChanged(boolean isPlaying) { btnPlayPause.setImageResource(isPlaying ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play); }
                  });

                  startStallDetectionTask();

                  btnPlayPause.setOnClickListener(v -> { if (player.isPlaying()) player.pause(); else player.play(); });
                  btnRewind.setOnClickListener(v -> player.seekBack());
                  btnForward.setOnClickListener(v -> player.seekForward());
                  btnNext.setOnClickListener(v -> playNextItem());
                  btnPrev.setOnClickListener(v -> playPreviousItem());
                  btnCast.setOnClickListener(v -> { if (currentChannel != null) startActivity(Intent.createChooser(new Intent(Intent.ACTION_VIEW).setDataAndType(Uri.parse(currentChannel.u), "video/*"), "Open with...")); });
                  fullContainer.setOnClickListener(v -> showOverlayControls());
                  fullFavBtn.setOnClickListener(v -> toggleFavorite());
                  findViewById(R.id.btn_toggle_fav).setOnClickListener(v -> toggleFavorite());

                  rvGroups = findViewById(R.id.rv_groups); rvItems = findViewById(R.id.rv_items);
                  txtTitle = findViewById(R.id.txt_title); rvGroups.setLayoutManager(new LinearLayoutManager(this));

                  loadFavoritesFromPrefs(); fetchM3uData(); updateProgressBarTask();

                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override public void handleOnBackPressed() {
                          if (fullContainer.getVisibility() == View.VISIBLE) toggleFullScreenMode(false);
                          else if (!historyStack.isEmpty()) renderGallery(historyStack.pop());
                          else showExitConfirmationDialog();
                      }
                  });

                  findViewById(R.id.tab_live).setOnClickListener(v -> switchDisplayMode("live"));
                  findViewById(R.id.tab_movie).setOnClickListener(v -> switchDisplayMode("movie"));
                  findViewById(R.id.tab_series).setOnClickListener(v -> switchDisplayMode("series"));
                  findViewById(R.id.tab_fav).setOnClickListener(v -> switchDisplayMode("fav"));
              }

              private void startStallDetectionTask() {
                  handler.postDelayed(new Runnable() {
                      @Override public void run() {
                          if (player != null && player.isPlaying() && currentMode.equals("live")) {
                              long currentPos = player.getCurrentPosition();
                              if (currentPos == lastPlaybackPosition) {
                                  stallCounter++;
                                  if (stallCounter >= 2) { loadingSmall.setVisibility(View.VISIBLE); loadingFull.setVisibility(View.VISIBLE); if (stallCounter >= 4) { forcePlayerReload(); stallCounter = 0; } }
                              } else { stallCounter = 0; loadingSmall.setVisibility(View.GONE); loadingFull.setVisibility(View.GONE); }
                              lastPlaybackPosition = currentPos;
                          }
                          handler.postDelayed(this, 500);
                      }
                  }, 500);
              }

              private void forcePlayerReload() { if (currentChannel != null) { player.prepare(); player.play(); } }

              private void toggleFullScreenMode(boolean goFull) {
                  if (goFull) {
                      mainUiContainer.setVisibility(View.GONE); fullContainer.setVisibility(View.VISIBLE);
                      PlayerView.switchTargetView(player, smallPlayerView, fullPlayerView);
                      showOverlayControls();
                      btnPlayPause.requestFocus(); // تفعيل الريموت فوراً
                  } else {
                      fullContainer.setVisibility(View.GONE); mainUiContainer.setVisibility(View.VISIBLE);
                      PlayerView.switchTargetView(player, fullPlayerView, smallPlayerView);
                      if (savedItemIndex != -1) rvItems.postDelayed(() -> { rvItems.scrollToPosition(savedItemIndex); rvItems.requestFocus(); }, 150);
                  }
              }

              private void playChannel(Channel channel, int position, boolean isDoubleClick) {
                  currentChannel = channel; savedItemIndex = position; lastPlaybackPosition = -1; stallCounter = 0;
                  player.setMediaItem(MediaItem.fromUri(channel.u)); player.prepare();
                  long savedPos = getSharedPreferences("resume_prefs", MODE_PRIVATE).getLong(channel.u, 0);
                  if (savedPos > 0 && !currentMode.equals("live")) player.seekTo(savedPos);
                  player.play(); txtTitle.setText(channel.n); tFullChName.setText(channel.n);
                  Glide.with(this).load(channel.l).into(fullChannelLogo); updateFavoriteIconUI();
                  if (isDoubleClick || !currentMode.equals("live")) toggleFullScreenMode(true);
              }

              private void switchDisplayMode(String mode) {
                  currentMode = mode; historyStack.clear();
                  LinearLayout.LayoutParams params = (LinearLayout.LayoutParams) rvItems.getLayoutParams();
                  if (mode.equals("live")) { leftSideContainer.setVisibility(View.VISIBLE); params.weight = 0.55f; rvItems.setLayoutManager(new LinearLayoutManager(this)); }
                  else { leftSideContainer.setVisibility(View.GONE); params.weight = 0.80f; rvItems.setLayoutManager(new GridLayoutManager(this, 4)); }
                  rvItems.setLayoutParams(params);
                  if (mode.equals("fav")) { currentItems = new ArrayList<>(favoriteList); rvGroups.setVisibility(View.GONE); rvItems.setAdapter(new ItemAdapter(currentItems)); return; }
                  rvGroups.setVisibility(View.VISIBLE);
                  Map<String, List<Channel>> targetMap = mode.equals("movie") ? movieData : (mode.equals("series") ? seriesData : liveData);
                  List<String> groups = new ArrayList<>(targetMap.keySet()); rvGroups.setAdapter(new GroupAdapter(groups));
                  if (!groups.isEmpty()) { currentCategory = groups.get(0); renderGallery("root"); }
              }

              private void renderGallery(String pid) {
                  currentParentId = pid; List<Channel> filtered = new ArrayList<>();
                  for (Channel c : database) if (determineType(c).equals(currentMode) && c.g.equals(currentCategory) && c.pid.equals(pid)) filtered.add(c);
                  currentItems = filtered; rvItems.setAdapter(new ItemAdapter(currentItems));
                  rvItems.postDelayed(() -> { if(rvItems.getChildCount() > 0) rvItems.getChildAt(0).requestFocus(); }, 200);
              }

              private String determineType(Channel c) {
                  if ("1".equals(c.isF)) return "series";
                  String g = (c.g != null) ? c.g.toLowerCase() : "", u = (c.u != null) ? c.u.toLowerCase() : "";
                  if (g.contains("movie") || g.contains("أفلام") || g.contains("افلام") || u.contains("/movie/")) return "movie";
                  if (g.contains("series") || g.contains("مسلسل") || g.contains("حلقات") || u.contains("/series/")) return "series";
                  return "live";
              }

              private void fetchM3uData() { Volley.newRequestQueue(this).add(new StringRequest(Request.Method.GET, "https://gist.githubusercontent.com/rabiebobo3/d498347610d7312b3e9be88093117620/raw/list.m3u", response -> { parseM3u(response); switchDisplayMode("live"); }, null)); }
              
              private void parseM3u(String data) {
                  database.clear(); liveData.clear(); movieData.clear(); seriesData.clear();
                  String[] lines = data.split("\n"); Channel current = null;
                  for (String line : lines) {
                      if (line.contains("#EXTINF:")) {
                          current = new Channel();
                          current.n = line.split(",").length > 1 ? line.split(",")[1].trim() : "Unknown";
                          current.g = line.contains("group-title=\"") ? line.split("group-title=\"")[1].split("\"")[0] : "عام";
                          current.l = line.contains("tvg-logo=\"") ? line.split("tvg-logo=\"")[1].split("\"")[0] : "";
                          current.id = line.contains("tvg-id=\"") ? line.split("tvg-id=\"")[1].split("\"")[0] : "";
                          current.pid = line.contains("parent-id=\"") ? line.split("parent-id=\"")[1].split("\"")[0] : "root";
                          current.isF = line.contains("is-folder=\"") ? line.split("is-folder=\"")[1].split("\"")[0] : "0";
                      } else if (line.trim().startsWith("http") && current != null) {
                          current.u = line.trim(); database.add(current);
                          String type = determineType(current); Map<String, List<Channel>> map = type.equals("movie") ? movieData : (type.equals("series") ? seriesData : liveData);
                          if (!map.containsKey(current.g)) map.put(current.g, new ArrayList<>());
                          map.get(current.g).add(current); current = null;
                      }
                  }
              }
              private void saveCurrentPosition() { if (currentChannel != null && !currentMode.equals("live")) getSharedPreferences("resume_prefs", MODE_PRIVATE).edit().putLong(currentChannel.u, player.getCurrentPosition()).apply(); }
              private void loadFavoritesFromPrefs() {
                  favoriteList = new Gson().fromJson(getSharedPreferences("app_prefs", MODE_PRIVATE).getString("favs", "[]"), new TypeToken<List<Channel>>(){}.getType());
                  if (favoriteList == null) favoriteList = new ArrayList<>();
              }
              private void toggleFavorite() {
                  if (currentChannel == null) return;
                  int foundAt = -1; for (int i = 0; i < favoriteList.size(); i++) if (favoriteList.get(i).u.equals(currentChannel.u)) foundAt = i;
                  if (foundAt != -1) favoriteList.remove(foundAt); else favoriteList.add(currentChannel);
                  getSharedPreferences("app_prefs", MODE_PRIVATE).edit().putString("favs", new Gson().toJson(favoriteList)).apply();
                  updateFavoriteIconUI();
              }
              private void updateFavoriteIconUI() {
                  boolean isFav = false; if (currentChannel != null) for (Channel f : favoriteList) if (f.u.equals(currentChannel.u)) isFav = true;
                  fullFavBtn.setImageResource(isFav ? android.R.drawable.btn_star_big_on : android.R.drawable.btn_star_big_off);
              }
              private void showOverlayControls() { overlayFull.setVisibility(View.VISIBLE); vodControls.setVisibility(currentMode.equals("live") ? View.GONE : View.VISIBLE); handler.removeCallbacks(hideOverlayRunnable); handler.postDelayed(hideOverlayRunnable, 5000); }
              private Runnable hideOverlayRunnable = () -> overlayFull.setVisibility(View.GONE);
              private void updateProgressBarTask() {
                  if (player != null && !currentMode.equals("live")) {
                      long duration = player.getDuration(), position = player.getCurrentPosition();
                      if (duration > 0) { seekBar.setMax((int) duration); seekBar.setProgress((int) position); txtTime.setText(formatTime(position) + " / " + formatTime(duration)); }
                  }
                  handler.postDelayed(this::updateProgressBarTask, 1000);
              }
              private String formatTime(long ms) { long s=(ms/1000)%60, m=(ms/60000)%60, h=(ms/3600000); return h>0?String.format("%02d:%02d:%02d",h,m,s):String.format("%02d:%02d",m,s); }
              private void hideSystemUI() { getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_FULLSCREEN); }
              private void showExitConfirmationDialog() { new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog_Alert).setTitle("خروج").setMessage("هل تريد إغلاق Rabie Pro؟").setPositiveButton("نعم", (dialog, which) -> finish()).setNegativeButton("لا", null).show(); }
              private void playNextItem() { int index = currentItems.indexOf(currentChannel); if (index != -1 && index < currentItems.size() - 1) playChannel(currentItems.get(index + 1), index + 1, true); }
              private void playPreviousItem() { int index = currentItems.indexOf(currentChannel); if (index > 0) playChannel(currentItems.get(index - 1), index - 1, true); }
              @Override protected void onPause() { super.onPause(); if (player != null) player.stop(); }
              @Override protected void onDestroy() { super.onDestroy(); if (player != null) player.release(); handler.removeCallbacksAndMessages(null); }

              class GroupAdapter extends RecyclerView.Adapter<GroupAdapter.ViewHolder> {
                  List<String> groups; GroupAdapter(List<String> groups) { this.groups = groups; }
                  @Override public ViewHolder onCreateViewHolder(ViewGroup p, int vt) { return new ViewHolder(LayoutInflater.from(p.getContext()).inflate(R.layout.item_channel, p, false)); }
                  @Override public void onBindViewHolder(ViewHolder h, int pos) { h.name.setText(groups.get(pos)); h.itemView.setFocusable(true); h.itemView.setOnClickListener(v -> { currentCategory = groups.get(pos); renderGallery("root"); }); }
                  @Override public int getItemCount() { return groups.size(); }
                  class ViewHolder extends RecyclerView.ViewHolder { TextView name; ViewHolder(View v) { super(v); name = v.findViewById(R.id.txt_name); } }
              }
              class ItemAdapter extends RecyclerView.Adapter<ItemAdapter.ViewHolder> {
                  List<Channel> list; ItemAdapter(List<Channel> list) { this.list = list; }
                  @Override public int getItemViewType(int pos) { return currentMode.equals("live") ? 0 : 1; }
                  @Override public ViewHolder onCreateViewHolder(ViewGroup p, int vt) { return new ViewHolder(LayoutInflater.from(p.getContext()).inflate(vt == 0 ? R.layout.item_channel : R.layout.item_card, p, false)); }
                  @Override public void onBindViewHolder(ViewHolder h, int pos) {
                      Channel c = list.get(pos); h.name.setText(c.n); Glide.with(h.itemView).load(c.l).into(h.img); h.itemView.setFocusable(true);
                      h.itemView.setOnClickListener(v -> { if ("1".equals(c.isF)) { historyStack.push(currentParentId); renderGallery(c.id); } else { long now = System.currentTimeMillis(); boolean isDouble = (now - lastClickTime < 500); lastClickTime = now; playChannel(c, pos, isDouble); } });
                  }
                  @Override public int getItemCount() { return list.size(); }
                  class ViewHolder extends RecyclerView.ViewHolder { TextView name; ImageView img; ViewHolder(View v) { super(v); name = v.findViewById(R.id.txt_name); img = v.findViewById(R.id.img_logo); } }
              }
          }
