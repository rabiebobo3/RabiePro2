name: Rabie_Pro_Final_Resurrection
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Basic Project
        run: |
          mkdir -p app/src/main/java/com/rabie/iptv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # build.gradle (Main)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.iptv'
              compileSdk 33
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 33; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.videolan.android:libvlc-all:3.5.1'
          }
          EOF

      - name: Build with Gradle Command
        run: gradle assembleDebug
