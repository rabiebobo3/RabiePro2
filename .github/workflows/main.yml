name: Rabie_Pro_V42_Final_Auto_Reload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Optimized_Clean
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/values
          
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          cat <<EOF > app/proguard-rules.pro
          -keep class com.rabie.iptv.** { *; }
          -keep class androidx.media3.** { *; }
          -keep class com.google.android.gms.cast.** { *; }
          -keep class com.google.gson.** { *; }
          -keep class com.bumptech.glide.** { *; }
          -keep class com.android.volley.** { *; }
          -keep public class * extends android.app.Activity
          -keepattributes Signature, *Annotation*
          -dontwarn androidx.media3.**
          -dontwarn com.google.android.gms.cast.**
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.rabie.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode 42
                  versionName "42.0"
                  resConfigs "ar", "en"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          EOF

          # [هنا تضع كود الـ Manifest و MainActivity وبقية الملفات كما هي عندك]

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_V42_Apk
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V42_Final, path: app/build/outputs/apk/debug/*.apk }
