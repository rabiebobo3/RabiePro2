name: Rabie_Pro_Xtream_Rocket
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Xtream_Engine
        run: |
          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/values
          
          # UI Setup (Black & Orange)
          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="bg_dark">#05030A</color>
              <color name="accent_orange">#FF9100</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          # Professional Xtream UI
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" 
              android:background="@color/bg_dark" android:keepScreenOn="true">
              
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal">
                  <LinearLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.65" android:orientation="vertical" android:padding="10dp">
                      <FrameLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:background="#000">
                          <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
                          <ProgressBar android:id="@+id/loader" android:layout_width="50dp" android:layout_height="50dp" android:layout_gravity="center" android:indeterminateTint="@color/accent_orange" android:visibility="gone"/>
                      </FrameLayout>
                      <TextView android:id="@+id/status_bar" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="RABIE PRO XTREAM" android:textColor="@color/accent_orange" android:gravity="center" android:padding="5dp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.35" android:orientation="horizontal">
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_ch" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_cat" android:layout_width="100dp" android:layout_height="match_parent" android:background="#111"/>
                  </LinearLayout>
              </LinearLayout>
          </RelativeLayout>
          EOF

          # Xtream Core Logic
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.*;
          import com.android.volley.*;
          import com.android.volley.toolbox.*;
          import org.json.*;
          import org.videolan.libvlc.*;
          import org.videolan.libvlc.util.VLCVideoLayout;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private String DNS = "http://myserveriptv.com:2082";
              private String USER = "NoRaNabil12", PASS = "NoRaNabil21";
              private LibVLC vlc;
              private MediaPlayer player;
              private RecyclerView rvCat, rvCh;
              private ProgressBar loader;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  hideSystemUI();

                  loader = findViewById(R.id.loader);
                  rvCat = findViewById(R.id.rv_cat);
                  rvCh = findViewById(R.id.rv_ch);
                  rvCat.setLayoutManager(new LinearLayoutManager(this));
                  rvCh.setLayoutManager(new LinearLayoutManager(this));

                  initVLC();
                  loadCategories();
              }

              private void initVLC() {
                  ArrayList<String> opts = new ArrayList<>();
                  opts.add("--network-caching=1500");
                  opts.add("--vdec-hardware=all");
                  vlc = new LibVLC(this, opts);
                  player = new MediaPlayer(vlc);
                  player.setEventListener(e -> {
                      if (e.type == MediaPlayer.Event.Buffering) runOnUiThread(()->loader.setVisibility(View.VISIBLE));
                      else if (e.type == MediaPlayer.Event.Playing) runOnUiThread(()->loader.setVisibility(View.GONE));
                  });
                  player.attachViews(findViewById(R.id.vlc_view), null, true, false);
              }

              private void loadCategories() {
                  String url = DNS + "/player_api.php?username=" + USER + "&password=" + PASS + "&action=get_live_categories";
                  Volley.newRequestQueue(this).add(new JsonArrayRequest(url, res -> {
                      List<String> cats = new ArrayList<>();
                      Map<String, String> catMap = new HashMap<>();
                      try {
                          for(int i=0; i<res.length(); i++) {
                              JSONObject o = res.getJSONObject(i);
                              cats.add(o.getString("category_name"));
                              catMap.put(o.getString("category_name"), o.getString("category_id"));
                          }
                          rvCat.setAdapter(new CatAdapter(cats, id -> loadChannels(catMap.get(id))));
                      } catch(Exception e) {}
                  }, null));
              }

              private void loadChannels(String catId) {
                  loader.setVisibility(View.VISIBLE);
                  String url = DNS + "/player_api.php?username=" + USER + "&password=" + PASS + "&action=get_live_streams&category_id=" + catId;
                  Volley.newRequestQueue(this).add(new JsonArrayRequest(url, res -> {
                      try {
                          List<JSONObject> channels = new ArrayList<>();
                          for(int i=0; i<res.length(); i++) channels.add(res.getJSONObject(i));
                          rvCh.setAdapter(new ChanAdapter(channels));
                          loader.setVisibility(View.GONE);
                      } catch(Exception e) {}
                  }, null));
              }

              private void play(String streamId) {
                  String streamUrl = DNS + "/live/" + USER + "/" + PASS + "/" + streamId + ".ts";
                  Media m = new Media(vlc, Uri.parse(streamUrl));
                  player.setMedia(m); m.release();
                  player.play();
              }

              // Adapters
              class CatAdapter extends RecyclerView.Adapter<CatAdapter.VH> {
                  List<String> l; OnClick k; CatAdapter(List<String> l, OnClick k){this.l=l; this.k=k;}
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(new TextView(p.getContext())); }
                  public void onBindViewHolder(VH h, int i) {
                      TextView t = (TextView)h.itemView; t.setText(l.get(i)); t.setPadding(10,20,10,20); t.setTextColor(0xFFFFFFFF);
                      t.setFocusable(true); t.setOnClickListener(v -> k.click(l.get(i)));
                      t.setOnFocusChangeListener((v, f) -> v.setBackgroundColor(f ? 0xFFFF9100 : 0));
                  }
                  public int getItemCount() { return l.size(); }
                  class VH extends RecyclerView.ViewHolder { VH(View v){super(v);} }
                  interface OnClick { void click(String id); }
              }

              class ChanAdapter extends RecyclerView.Adapter<ChanAdapter.VH> {
                  List<JSONObject> l; ChanAdapter(List<JSONObject> l){this.l=l;}
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(new TextView(p.getContext())); }
                  public void onBindViewHolder(VH h, int i) {
                      try {
                          TextView t = (TextView)h.itemView; t.setText(l.get(i).getString("name"));
                          t.setPadding(10,20,10,20); t.setTextColor(0xFFFFFFFF); t.setFocusable(true);
                          t.setOnFocusChangeListener((v, f) -> v.setBackgroundColor(f ? 0xFFFF9100 : 0));
                          t.setOnClickListener(v -> { try { play(l.get(i).getString("stream_id")); } catch(Exception e){} });
                      } catch(Exception e){}
                  }
                  public int getItemCount() { return l.size(); }
                  class VH extends RecyclerView.ViewHolder { VH(View v){super(v);} }
              }

              private void hideSystemUI() {
                  getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_FULLSCREEN | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
              }
          }
          EOF

          # Build Config
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'; compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 46; versionName "46.0" }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'org.videolan.android:libvlc-all:3.6.0-eap11'
          }
          EOF

          ./gradlew :app:assembleDebug
