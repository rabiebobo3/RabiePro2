name: Rabie_Pro_V42_Final_Pistache
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Clean_Fixed_Path
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          # إنشاء كل المجلدات أولاً لضمان عدم وجود مسار مفقود
          mkdir -p app/src/main/java/com/rabie/iptv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/values

          # تحميل اللوجو
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg
          cp app/src/main/res/drawable/app_logo.png app/src/main/res/mipmap-hdpi/ic_launcher.png

          # كتابة ملف المانيفست في مكانه الصحيح 100%
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true" android:label="Rabie Pro V42" android:icon="@mipmap/ic_launcher" android:banner="@mipmap/ic_launcher" android:hardwareAccelerated="true">
                  <activity android:name="com.rabie.iptv.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # كتابة بقية الملفات (Layout, Colors, etc.)
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#05030A</color><color name="colorAccent">#FF9100</color></resources>' > app/src/main/res/values/colors.xml
          echo '<resources><string name="app_name">Rabie Pro V42</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 42; versionName "42.0" }
              configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.10' } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.media3:media3-exoplayer-hls:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              implementation 'androidx.mediarouter:mediarouter:1.7.0'
              implementation 'com.google.android.gms:play-services-cast-framework:21.4.0'
              implementation 'de.hdodenhof:circleimageview:3.1.0'
          }
          EOF

          # هنا يجب وضع كود MainActivity.java و activity_main.xml كما في الردود السابقة
          # تأكد من وضع كود الـ Java والـ Layout كاملاً قبل تشغيل gradle

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_V42_Apk
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V42_Final, path: app/build/outputs/apk/debug/*.apk }
