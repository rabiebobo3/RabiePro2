name: Rabie_Pro_V43_Dual_Players
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_With_VLC_And_ExoPlayer
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/values
          
          curl -Lo app/src/main/res/mipmap-hdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#05030A</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorAccent">#FF9100</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Rabie Pro</string>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent" 
              android:background="#05030A" android:keepScreenOn="true">
              
              <LinearLayout android:id="@+id/splash_screen" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:gravity="center" android:elevation="20dp">
                  <androidx.cardview.widget.CardView android:layout_width="150dp" android:layout_height="150dp" app:cardCornerRadius="75dp" app:cardBackgroundColor="#000" app:cardElevation="0dp">
                      <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                  </androidx.cardview.widget.CardView>
              </LinearLayout>

              <LinearLayout android:id="@+id/main_ui_container" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:visibility="gone">
                  <LinearLayout android:id="@+id/top_tabs" android:layout_width="match_parent" android:layout_height="65dp" android:background="#000" android:gravity="center_vertical" android:padding="10dp">
                      <androidx.cardview.widget.CardView android:layout_width="45dp" android:layout_height="45dp" app:cardCornerRadius="22.5dp" app:cardBackgroundColor="#000" android:layout_marginRight="10dp">
                          <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                      </androidx.cardview.widget.CardView>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RABIE PRO" android:textColor="#ff9100" android:textStyle="bold" android:textSize="22sp" android:layout_marginRight="20dp"/>
                      <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/tab_fav" android:layout_width="55dp" android:layout_height="42dp" android:text="⭐" android:textColor="#ff9100" android:textSize="16sp" android:focusable="true" android:background="@drawable/tab_button_style" android:nextFocusDown="@+id/rv_items"/>
                      <Button android:id="@+id/btn_settings" android:layout_width="55dp" android:layout_height="42dp" android:text="⚙️" android:textColor="#EEE" android:textSize="16sp" android:focusable="true" android:background="@drawable/tab_button_style" android:layout_marginLeft="8dp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal" android:baselineAligned="false">
                      <LinearLayout android:id="@+id/left_side_container" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.55" android:orientation="vertical" android:padding="10dp">
                          <androidx.cardview.widget.CardView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.65" app:cardCornerRadius="15dp" app:cardBackgroundColor="#000" app:cardElevation="12dp">
                              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent">
                                  <androidx.media3.ui.PlayerView android:id="@+id/small_player_exo" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false"/>
                                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/small_player_vlc" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
                                  <ProgressBar android:id="@+id/loading_s" android:layout_width="50dp" android:layout_height="50dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
                              </FrameLayout>
                          </androidx.cardview.widget.CardView>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.35" android:padding="20dp" android:layout_marginTop="10dp" android:background="@drawable/tab_button_style" android:orientation="vertical">
                              <TextView android:id="@+id/txt_title" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="اختر محتوى" android:textColor="#ff9100" android:textSize="20sp" android:textStyle="bold" android:maxLines="1"/>
                              <Button android:id="@+id/btn_toggle_fav" android:layout_width="wrap_content" android:layout_height="42dp" android:text="⭐ إضافة للمفضلة" android:layout_marginTop="15dp" android:focusable="true" android:background="@drawable/focus_highlight" android:paddingHorizontal="25dp" android:textColor="#FFF"/>
                          </LinearLayout>
                      </LinearLayout>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_items" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.25" android:background="#0A0817" android:focusable="true" android:nextFocusUp="@+id/top_tabs"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_groups" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.20" android:background="#120E26" android:focusable="true" android:nextFocusUp="@+id/top_tabs"/>
                  </LinearLayout>
              </LinearLayout>

              <FrameLayout android:id="@+id/full_container" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" android:background="#000" android:focusable="true" android:clickable="true">
                  <androidx.media3.ui.PlayerView android:id="@+id/full_player_exo" android:layout_width="match_parent" android:layout_height="match_parent" app:resize_mode="fill" app:use_controller="false" />
                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/full_player_vlc" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
                  
                  <LinearLayout android:id="@+id/overlay_full" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="bottom" android:visibility="gone">
                      <LinearLayout android:id="@+id/infobar_layout" android:layout_width="match_parent" android:layout_height="wrap_content" android:background="#E6000000" android:orientation="horizontal" android:padding="15dp" android:gravity="center_vertical">
                          <androidx.cardview.widget.CardView android:layout_width="60dp" android:layout_height="60dp" app:cardCornerRadius="30dp" app:cardBackgroundColor="#000" android:layout_marginRight="15dp">
                              <ImageView android:id="@+id/full_ch_logo" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="centerCrop"/>
                          </androidx.cardview.widget.CardView>
                          <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical">
                              <TextView android:id="@+id/full_ch_name" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#ff9100" android:textSize="22sp" android:textStyle="bold"/>
                              <TextView android:id="@+id/txt_player_type" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#AAA" android:textSize="12sp" android:layout_marginTop="3dp"/>
                          </LinearLayout>
                          <ImageButton android:id="@+id/btn_dlna" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/ic_menu_share" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                          <ImageButton android:id="@+id/full_fav_btn" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/btn_star_big_off" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                          <androidx.mediarouter.app.MediaRouteButton android:id="@+id/media_route_button" android:layout_width="50dp" android:layout_height="50dp" android:focusable="true" android:background="@drawable/round_btn"/>
                      </LinearLayout>
                      <LinearLayout android:id="@+id/vod_controls" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="#B3000000" android:padding="15dp" android:gravity="center">
                          <SeekBar android:id="@+id/full_seekbar" android:layout_width="match_parent" android:layout_height="wrap_content" android:progressTint="#ff9100" android:thumbTint="#ff9100" android:focusable="true"/>
                          <RelativeLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                               <TextView android:id="@+id/txt_time" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="00:00 / 00:00" android:textColor="#FFF" android:textSize="14sp" android:layout_centerVertical="true"/>
                               <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_centerInParent="true">
                                  <ImageButton android:id="@+id/btn_prev_item" android:layout_width="45dp" android:layout_height="45dp" android:src="@android:drawable/ic_media_previous" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_rew" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/ic_media_rew" android:background="@drawable/round_btn" android:layout_marginRight="10dp" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_play_pause" android:layout_width="65dp" android:layout_height="65dp" android:src="@android:drawable/ic_media_pause" android:background="@drawable/round_btn_orange" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_ffwd" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/ic_media_ff" android:background="@drawable/round_btn" android:layout_marginLeft="10dp" android:focusable="true"/>
                                  <ImageButton android:id="@+id/btn_next_item" android:layout_width="45dp" android:layout_height="45dp" android:src="@android:drawable/ic_media_next" android:background="@drawable/round_btn" android:layout_marginLeft="10dp" android:focusable="true"/>
                               </LinearLayout>
                          </RelativeLayout>
                      </LinearLayout>
                  </LinearLayout>
                  <ProgressBar android:id="@+id/loading_f" android:layout_width="80dp" android:layout_height="80dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          cat <<EOF > app/src/main/res/layout/dialog_settings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="600dp"
              android:layout_height="wrap_content"
              android:orientation="vertical"
              android:padding="25dp"
              android:background="@drawable/tab_button_style">
              
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="⚙️ الإعدادات"
                  android:textColor="#ff9100"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:gravity="center"
                  android:layout_marginBottom="25dp"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:padding="15dp"
                  android:background="@drawable/focus_highlight"
                  android:layout_marginBottom="15dp">
                  
                  <LinearLayout
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:orientation="vertical">
                      
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="🎬 استخدام مشغل VLC"
                          android:textColor="#FFF"
                          android:textSize="18sp"
                          android:textStyle="bold"/>
                      
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="مشغل قوي بدون تجمد (يُنصح به)"
                          android:textColor="#AAA"
                          android:textSize="13sp"
                          android:layout_marginTop="5dp"/>
                  </LinearLayout>
                  
                  <CheckBox
                      android:id="@+id/cb_use_vlc"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:buttonTint="#ff9100"
                      android:scaleX="1.3"
                      android:scaleY="1.3"/>
              </LinearLayout>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:padding="15dp"
                  android:background="@drawable/focus_highlight"
                  android:layout_marginBottom="15dp">
                  
                  <LinearLayout
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:orientation="vertical">
                      
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="🔇 تشغيل صامت عند بدء التطبيق"
                          android:textColor="#FFF"
                          android:textSize="18sp"
                          android:textStyle="bold"/>
                      
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="منع التشغيل التلقائي في الخلفية"
                          android:textColor="#AAA"
                          android:textSize="13sp"
                          android:layout_marginTop="5dp"/>
                  </LinearLayout>
                  
                  <CheckBox
                      android:id="@+id/cb_prevent_bg"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:buttonTint="#ff9100"
                      android:scaleX="1.3"
                      android:scaleY="1.3"
                      android:checked="true"/>
              </LinearLayout>

              <Button
                  android:id="@+id/btn_save_settings"
                  android:layout_width="match_parent"
                  android:layout_height="55dp"
                  android:text="✅ حفظ الإعدادات"
                  android:textColor="#FFF"
                  android:textSize="16sp"
                  android:textStyle="bold"
                  android:background="@drawable/round_btn_orange"
                  android:layout_marginTop="10dp"/>
          </LinearLayout>
          EOF

          cat <<'JAVAEOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.app.Dialog;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.ConnectivityManager;
          import android.net.Network;
          import android.net.NetworkCapabilities;
          import android.net.NetworkRequest;
          import android.net.Uri;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.activity.OnBackPressedCallback;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.*;
          import androidx.media3.datasource.*;
          import androidx.media3.exoplayer.*;
          import androidx.media3.exoplayer.source.*;
          import androidx.media3.exoplayer.trackselection.*;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.*;
          import com.android.volley.*;
          import com.android.volley.toolbox.*;
          import com.bumptech.glide.Glide;
          import com.google.gson.Gson;
          import com.google.gson.reflect.TypeToken;
          import java.util.*;
          import com.google.android.gms.cast.framework.*;
          import androidx.mediarouter.app.MediaRouteButton;
          import org.videolan.libvlc.*;
          import org.videolan.libvlc.util.VLCVideoLayout;

          public class MainActivity extends AppCompatActivity {
              // ═══════════════════════════════════════════════════════════════════════════════════
              // 🎬 نظام المشغلات المزدوج: ExoPlayer + VLC
              // ═══════════════════════════════════════════════════════════════════════════════════
              private ExoPlayer exoPlayer;
              private LibVLC libVLC;
              private org.videolan.libvlc.MediaPlayer vlcPlayer;
              private boolean useVLC = false;
              private boolean preventBackground = true;
              
              private List<Ch> database = new ArrayList<>();
              private Map<String, List<Ch>> live = new LinkedHashMap<>(), movie = new LinkedHashMap<>(), series = new LinkedHashMap<>();
              private List<Ch> favList = new ArrayList<>(), currentItems = new ArrayList<>();
              private Stack<String> historyStack = new Stack<>();
              private String currentParentId = "root", currentCat = "", currentMode = "live";
              private Ch currentCh;
              private RecyclerView rvG, rvI;
              private TextView tTitle, tTime, tFullChName, txtPlayerType;
              private PlayerView smallPVExo, fullPVExo;
              private VLCVideoLayout smallPVVlc, fullPVVlc;
              private View mainUI, fullCont, overlay, vodControls, splash, infoBar, leftSide;
              private ImageView fullChLogo, fullFavBtn;
              private SeekBar seekBar;
              private ProgressBar ps, pf;
              private ImageButton btnPP, btnRew, btnFF, btnNext, btnPrev, btnDlna;
              private Handler handler = new Handler(Looper.getMainLooper());
              private long lastClickTime = 0;
              private int savedItemIndex = -1;
              private SharedPreferences prefs;

              static class Ch { String n, u, g, l, id, pid, isF; }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  hideSystemUI();

                  prefs = getSharedPreferences("settings", MODE_PRIVATE);
                  useVLC = prefs.getBoolean("use_vlc", false);
                  preventBackground = prefs.getBoolean("prevent_bg", true);

                  MediaRouteButton mrb = findViewById(R.id.media_route_button);
                  CastButtonFactory.setUpMediaRouteButton(getApplicationContext(), mrb);

                  splash = findViewById(R.id.splash_screen); 
                  mainUI = findViewById(R.id.main_ui_container);
                  infoBar = findViewById(R.id.infobar_layout); 
                  leftSide = findViewById(R.id.left_side_container);
                  fullChLogo = findViewById(R.id.full_ch_logo); 
                  tFullChName = findViewById(R.id.full_ch_name);
                  txtPlayerType = findViewById(R.id.txt_player_type);
                  fullFavBtn = findViewById(R.id.full_fav_btn); 
                  btnDlna = findViewById(R.id.btn_dlna);

                  handler.postDelayed(() -> { 
                      splash.setVisibility(View.GONE); 
                      mainUI.setVisibility(View.VISIBLE); 
                  }, 2000);

                  // ═══════════════════════════════════════════════════════════════════════════════════
                  // 🎯 تهيئة المشغلات
                  // ═══════════════════════════════════════════════════════════════════════════════════
                  smallPVExo = findViewById(R.id.small_player_exo);
                  fullPVExo = findViewById(R.id.full_player_exo);
                  smallPVVlc = findViewById(R.id.small_player_vlc);
                  fullPVVlc = findViewById(R.id.full_player_vlc);

                  initExoPlayer();
                  initVLCPlayer();
                  
                  fullCont = findViewById(R.id.full_container); 
                  overlay = findViewById(R.id.overlay_full);
                  tTime = findViewById(R.id.txt_time); 
                  seekBar = findViewById(R.id.full_seekbar);
                  vodControls = findViewById(R.id.vod_controls);
                  ps = findViewById(R.id.loading_s); 
                  pf = findViewById(R.id.loading_f);
                  btnPP = findViewById(R.id.btn_play_pause);
                  btnRew = findViewById(R.id.btn_rew); 
                  btnFF = findViewById(R.id.btn_ffwd);
                  btnNext = findViewById(R.id.btn_next_item); 
                  btnPrev = findViewById(R.id.btn_prev_item);

                  setupPlayerControls();

                  fullCont.setOnClickListener(v -> showOverlay());
                  fullFavBtn.setOnClickListener(v -> toggleFav());
                  findViewById(R.id.btn_toggle_fav).setOnClickListener(v -> toggleFav());
                  findViewById(R.id.btn_settings).setOnClickListener(v -> showSettingsDialog());

                  rvG = findViewById(R.id.rv_groups); 
                  rvI = findViewById(R.id.rv_items);
                  tTitle = findViewById(R.id.txt_title);
                  rvG.setLayoutManager(new LinearLayoutManager(this));

                  loadFavs(); 
                  loadData();
                  updateProgress();
                  registerNetworkCallback();

                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override 
                      public void handleOnBackPressed() {
                          if (fullCont.getVisibility() == View.VISIBLE) toggleFull(false);
                          else if (!historyStack.isEmpty()) renderGallery(historyStack.pop());
                          else showExitDialog();
                      }
                  });

                  findViewById(R.id.tab_live).setOnClickListener(v -> setMode("live"));
                  findViewById(R.id.tab_movie).setOnClickListener(v -> setMode("movie"));
                  findViewById(R.id.tab_series).setOnClickListener(v -> setMode("series"));
                  findViewById(R.id.tab_fav).setOnClickListener(v -> setMode("fav"));
              }

              // ═══════════════════════════════════════════════════════════════════════════════════
              // 🎬 تهيئة ExoPlayer
              // ═══════════════════════════════════════════════════════════════════════════════════
              private void initExoPlayer() {
                  DefaultHttpDataSource.Factory httpFactory = new DefaultHttpDataSource.Factory()
                      .setConnectTimeoutMs(15000)
                      .setReadTimeoutMs(15000)
                      .setAllowCrossProtocolRedirects(true)
                      .setUserAgent("Mozilla/5.0");

                  DefaultDataSource.Factory dataSourceFactory = new DefaultDataSource.Factory(this, httpFactory);

                  DefaultLoadControl loadControl = new DefaultLoadControl.Builder()
                      .setBufferDurationsMs(30000, 90000, 2000, 3000)
                      .setBackBuffer(20000, true)
                      .setPrioritizeTimeOverSizeThresholds(true)
                      .build();

                  DefaultTrackSelector trackSelector = new DefaultTrackSelector(this);
                  
                  exoPlayer = new ExoPlayer.Builder(this)
                      .setMediaSourceFactory(new DefaultMediaSourceFactory(dataSourceFactory))
                      .setLoadControl(loadControl)
                      .setTrackSelector(trackSelector)
                      .setSeekBackIncrementMs(10000)
                      .setSeekForwardIncrementMs(10000)
                      .build();

                  smallPVExo.setPlayer(exoPlayer);

                  exoPlayer.addListener(new Player.Listener() {
                      @Override
                      public void onPlaybackStateChanged(int state) {
                          int v = (state == Player.STATE_BUFFERING) ? View.VISIBLE : View.GONE;
                          ps.setVisibility(v);
                          pf.setVisibility(v);
                          if (state == Player.STATE_READY && currentCh != null) savePos();
                      }

                      @Override
                      public void onIsPlayingChanged(boolean playing) {
                          btnPP.setImageResource(playing ? android.R.drawable.ic_media_pause : android.R.drawable.ic_media_play);
                      }

                      @Override
                      public void onPlayerError(PlaybackException error) {
                          Toast.makeText(MainActivity.this, "خطأ ExoPlayer - جرب VLC من الإعدادات", Toast.LENGTH_LONG).show();
                      }
                  });
              }

              // ═══════════════════════════════════════════════════════════════════════════════════
              // 🎬 تهيئة VLC Player
              // ═══════════════════════════════════════════════════════════════════════════════════
              private void initVLCPlayer() {
                  try {
                      ArrayList<String> options = new ArrayList<>();
                      options.add("--aout=opensles");
                      options.add("--audio-time-stretch");
                      options.add("-vvv");
                      options.add("--network-caching=10000");
                      options.add("--file-caching=10000");
                      options.add("--live-caching=10000");
                      options.add("--http-reconnect");
                      options.add("--no-drop-late-frames");
                      options.add("--no-skip-frames");

                      libVLC = new LibVLC(this, options);
                      vlcPlayer = new org.videolan.libvlc.MediaPlayer(libVLC);

                      vlcPlayer.setEventListener(new org.videolan.libvlc.MediaPlayer.EventListener() {
                          @Override
                          public void onEvent(org.videolan.libvlc.MediaPlayer.Event event) {
                              runOnUiThread(() -> {
                                  switch (event.type) {
                                      case org.videolan.libvlc.MediaPlayer.Event.Buffering:
                                          float percent = event.getBuffering();
                                          if (percent < 100) {
                                              ps.setVisibility(View.VISIBLE);
                                              pf.setVisibility(View.VISIBLE);
                                          } else {
                                              ps.setVisibility(View.GONE);
                                              pf.setVisibility(View.GONE);
                                          }
                                          break;
                                      case org.videolan.libvlc.MediaPlayer.Event.Playing:
                                          ps.setVisibility(View.GONE);
                                          pf.setVisibility(View.GONE);
                                          btnPP.setImageResource(android.R.drawable.ic_media_pause);
                                          break;
                                      case org.videolan.libvlc.MediaPlayer.Event.Paused:
                                          btnPP.setImageResource(android.R.drawable.ic_media_play);
                                          break;
                                      case org.videolan.libvlc.MediaPlayer.Event.EncounteredError:
                                          Toast.makeText(MainActivity.this, "خطأ VLC - جرب ExoPlayer", Toast.LENGTH_SHORT).show();
                                          break;
                                  }
                              });
                          }
                      });
                  } catch (Exception e) {
                      Toast.makeText(this, "فشل تهيئة VLC", Toast.LENGTH_SHORT).show();
                  }
              }

              // ═══════════════════════════════════════════════════════════════════════════════════
              // ⚙️ نافذة الإعدادات
              // ═══════════════════════════════════════════════════════════════════════════════════
              private void showSettingsDialog() {
                  Dialog dialog = new Dialog(this, android.R.style.Theme_Black_NoTitleBar_Fullscreen);
                  dialog.setContentView(R.layout.dialog_settings);
                  
                  CheckBox cbVLC = dialog.findViewById(R.id.cb_use_vlc);
                  CheckBox cbBG = dialog.findViewById(R.id.cb_prevent_bg);
                  Button btnSave = dialog.findViewById(R.id.btn_save_settings);

                  cbVLC.setChecked(useVLC);
                  cbBG.setChecked(preventBackground);

                  btnSave.setOnClickListener(v -> {
                      boolean oldVLC = useVLC;
                      useVLC = cbVLC.isChecked();
                      preventBackground = cbBG.isChecked();

                      prefs.edit()
                          .putBoolean("use_vlc", useVLC)
                          .putBoolean("prevent_bg", preventBackground)
                          .apply();

                      Toast.makeText(this, "✅ تم حفظ الإعدادات", Toast.LENGTH_SHORT).show();
                      
                      if (oldVLC != useVLC && currentCh != null) {
                          stopAllPlayers();
                          handler.postDelayed(() -> playChannel(currentCh, savedItemIndex, true), 500);
                      }
                      
                      dialog.dismiss();
                  });

                  dialog.show();
              }

              // ═══════════════════════════════════════════════════════════════════════════════════
              // 🎮 التحكم في المشغلات
              // ═══════════════════════════════════════════════════════════════════════════════════
              private void setupPlayerControls() {
                  btnPP.setOnClickListener(v -> {
                      if (useVLC) {
                          if (vlcPlayer.isPlaying()) vlcPlayer.pause();
                          else vlcPlayer.play();
                      } else {
                          if (exoPlayer.isPlaying()) exoPlayer.pause();
                          else exoPlayer.play();
                      }
                  });

                  btnRew.setOnClickListener(v -> {
                      if (useVLC) {
                          long pos = vlcPlayer.getTime() - 10000;
                          vlcPlayer.setTime(Math.max(0, pos));
                      } else {
                          exoPlayer.seekBack();
                      }
                  });

                  btnFF.setOnClickListener(v -> {
                      if (useVLC) {
                          long pos = vlcPlayer.getTime() + 10000;
                          vlcPlayer.setTime(Math.min(vlcPlayer.getLength(), pos));
                      } else {
                          exoPlayer.seekForward();
                      }
                  });

                  btnNext.setOnClickListener(v -> playNext());
                  btnPrev.setOnClickListener(v -> playPrev());
                  
                  btnDlna.setOnClickListener(v -> {
                      if (currentCh == null) return;
                      startActivity(Intent.createChooser(
                          new Intent(Intent.ACTION_VIEW).setDataAndType(Uri.parse(currentCh.u), "video/*"), 
                          "بث عبر..."
                      ));
                  });
              }

              // ═══════════════════════════════════════════════════════════════════════════════════
              // ▶️ تشغيل القناة/الفيديو
              // ═══════════════════════════════════════════════════════════════════════════════════
              private void playChannel(Ch c, int pos, boolean doubleClick) {
                  currentCh = c;
                  savedItemIndex = pos;

                  stopAllPlayers();

                  if (useVLC) {
                      playWithVLC(c.u);
                      txtPlayerType.setText("🎬 VLC Player");
                      smallPVVlc.setVisibility(View.VISIBLE);
                      smallPVExo.setVisibility(View.GONE);
                  } else {
                      playWithExo(c.u);
                      txtPlayerType.setText("🎬 ExoPlayer");
                      smallPVExo.setVisibility(View.VISIBLE);
                      smallPVVlc.setVisibility(View.GONE);
                  }

                  tTitle.setText(c.n);
                  tFullChName.setText(c.n);
                  Glide.with(this).load(c.l).into(fullChLogo);
                  updateFavIcon();

                  if (doubleClick || !currentMode.equals("live")) {
                      toggleFull(true);
                  }
              }

              private void playWithExo(String url) {
                  MediaItem mediaItem = MediaItem.fromUri(url);
                  exoPlayer.setMediaItem(mediaItem);
                  exoPlayer.prepare();
                  
                  long pos = prefs.getLong(url, 0);
                  if (pos > 0 && !currentMode.equals("live")) {
                      exoPlayer.seekTo(pos);
                  }
                  
                  if (!preventBackground) {
                      exoPlayer.play();
                  }
              }

              private void playWithVLC(String url) {
                  try {
                      Media media = new Media(libVLC, Uri.parse(url));
                      media.setHWDecoderEnabled(true, false);
                      media.addOption(":network-caching=10000");
                      media.addOption(":file-caching=10000");
                      media.addOption(":live-caching=10000");
                      
                      vlcPlayer.setMedia(media);
                      media.release();
                      
                      long pos = prefs.getLong(url, 0);
                      if (pos > 0 && !currentMode.equals("live")) {
                          vlcPlayer.setTime(pos);
                      }
                      
                      if (!preventBackground) {
                          vlcPlayer.play();
                      }
                  } catch (Exception e) {
                      Toast.makeText(this, "خطأ في تشغيل VLC", Toast.LENGTH_SHORT).show();
                  }
              }

              private void stopAllPlayers() {
                  if (exoPlayer != null) {
                      exoPlayer.stop();
                      exoPlayer.clearMediaItems();
                  }
                  if (vlcPlayer != null && vlcPlayer.isPlaying()) {
                      vlcPlayer.stop();
                  }
              }

              // ═══════════════════════════════════════════════════════════════════════════════════
              // 🔄 التبديل بين الشاشات
              // ═══════════════════════════════════════════════════════════════════════════════════
              private void toggleFull(boolean full) {
                  if (full) {
                      mainUI.setVisibility(View.GONE);
                      fullCont.setVisibility(View.VISIBLE);
                      
                      if (useVLC) {
                          vlcPlayer.detachViews();
                          vlcPlayer.attachViews(fullPVVlc, null, false, false);
                          fullPVVlc.setVisibility(View.VISIBLE);
                          fullPVExo.setVisibility(View.GONE);
                      } else {
                          PlayerView.switchTargetView(exoPlayer, smallPVExo, fullPVExo);
                          fullPVExo.setVisibility(View.VISIBLE);
                          fullPVVlc.setVisibility(View.GONE);
                      }
                      
                      showOverlay();
                      showInfobar();
                      fullCont.requestFocus();
                  } else {
                      fullCont.setVisibility(View.GONE);
                      mainUI.setVisibility(View.VISIBLE);
                      
                      if (useVLC) {
                          vlcPlayer.detachViews();
                          vlcPlayer.attachViews(smallPVVlc, null, false, false);
                      } else {
                          PlayerView.switchTargetView(exoPlayer, fullPVExo, smallPVExo);
                      }
                      
                      if (savedItemIndex != -1) {
                          rvI.postDelayed(() -> {
                              rvI.scrollToPosition(savedItemIndex);
                              RecyclerView.ViewHolder vh = rvI.findViewHolderForAdapterPosition(savedItemIndex);
                              if (vh != null) vh.itemView.requestFocus();
                          }, 150);
                      }
                  }
              }

              private void savePos() {
                  if (currentCh == null || currentMode.equals("live")) return;
                  
                  long pos = useVLC ? vlcPlayer.getTime() : exoPlayer.getCurrentPosition();
                  if (pos > 0) {
                      prefs.edit().putLong(currentCh.u, pos).apply();
                  }
              }

              private void playNext() {
                  int i = currentItems.indexOf(currentCh);
                  if (i != -1 && i < currentItems.size() - 1)
                      playChannel(currentItems.get(i + 1), i + 1, true);
              }

              private void playPrev() {
                  int i = currentItems.indexOf(currentCh);
                  if (i > 0)
                      playChannel(currentItems.get(i - 1), i - 1, true);
              }

              @Override
              protected void onStop() {
                  super.onStop();
                  savePos();
                  if (preventBackground) {
                      if (useVLC && vlcPlayer != null) vlcPlayer.pause();
                      if (!useVLC && exoPlayer != null) exoPlayer.pause();
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacksAndMessages(null);
                  
                  if (exoPlayer != null) {
                      exoPlayer.release();
                      exoPlayer = null;
                  }
                  
                  if (vlcPlayer != null) {
                      vlcPlayer.release();
                      vlcPlayer = null;
                  }
                  
                  if (libVLC != null) {
                      libVLC.release();
                      libVLC = null;
                  }
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (fullCont.getVisibility() == View.VISIBLE) {
                      if (keyCode == KeyEvent.KEYCODE_DPAD_LEFT) {
                          if (useVLC) vlcPlayer.setTime(Math.max(0, vlcPlayer.getTime() - 10000));
                          else exoPlayer.seekBack();
                          showOverlay();
                          return true;
                      }
                      if (keyCode == KeyEvent.KEYCODE_DPAD_RIGHT) {
                          if (useVLC) vlcPlayer.setTime(Math.min(vlcPlayer.getLength(), vlcPlayer.getTime() + 10000));
                          else exoPlayer.seekForward();
                          showOverlay();
                          return true;
                      }
                      if (keyCode == KeyEvent.KEYCODE_DPAD_CENTER || keyCode == KeyEvent.KEYCODE_ENTER) {
                          if (overlay.getVisibility() == View.VISIBLE) overlay.setVisibility(View.GONE);
                          else showOverlay();
                          return true;
                      }
                      if (keyCode == KeyEvent.KEYCODE_DPAD_UP) {
                          showOverlay();
                          return true;
                      }
                  }
                  return super.onKeyDown(keyCode, event);
              }

              private void showOverlay() {
                  overlay.setVisibility(View.VISIBLE);
                  vodControls.setVisibility(currentMode.equals("live") ? View.GONE : View.VISIBLE);
                  handler.removeCallbacks(hideOverlay);
                  handler.postDelayed(hideOverlay, 5000);
              }

              private void registerNetworkCallback() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  if (cm == null) return;

                  NetworkRequest request = new NetworkRequest.Builder()
                      .addCapability(NetworkCapabilities.NET_CAPABILITY_INTERNET)
                      .build();

                  cm.registerNetworkCallback(request, new ConnectivityManager.NetworkCallback() {
                      @Override
                      public void onLost(Network network) {
                          runOnUiThread(() -> Toast.makeText(MainActivity.this, "⚠️ انقطاع الإنترنت", Toast.LENGTH_SHORT).show());
                      }

                      @Override
                      public void onAvailable(Network network) {
                          runOnUiThread(() -> Toast.makeText(MainActivity.this, "✅ عودة الاتصال", Toast.LENGTH_SHORT).show());
                      }
                  });
              }

              private String getT(Ch c) {
                  String g = c.g.toLowerCase();
                  if ("1".equals(c.isF)) return "series";
                  if (g.contains("movie") || g.contains("أفلام") || g.contains("افلام")) return "movie";
                  if (g.contains("series") || g.contains("مسلسل") || g.contains("حلقات")) return "series";
                  return "live";
              }

              private void setMode(String m) {
                  currentMode = m;
                  historyStack.clear();
                  LinearLayout.LayoutParams params = (LinearLayout.LayoutParams) rvI.getLayoutParams();
                  if (m.equals("live")) {
                      leftSide.setVisibility(View.VISIBLE);
                      params.weight = 0.55f;
                      rvI.setLayoutManager(new LinearLayoutManager(this));
                  } else {
                      leftSide.setVisibility(View.GONE);
                      params.weight = 0.80f;
                      rvI.setLayoutManager(new GridLayoutManager(this, 5));
                  }
                  rvI.setLayoutParams(params);
                  if (m.equals("fav")) {
                      currentItems = new ArrayList<>(favList);
                      rvG.setVisibility(View.GONE);
                      rvI.setAdapter(new ItemAdapter(currentItems));
                      return;
                  }
                  rvG.setVisibility(View.VISIBLE);
                  Map<String, List<Ch>> d = m.equals("movie") ? movie : (m.equals("series") ? series : live);
                  List<String> groups = new ArrayList<>(d.keySet());
                  rvG.setAdapter(new GroupAdapter(groups));
                  if (!groups.isEmpty()) {
                      currentCat = groups.get(0);
                      renderGallery("root");
                  }
              }

              private void renderGallery(String pid) {
                  currentParentId = pid;
                  List<Ch> filtered = new ArrayList<>();
                  for (Ch i : database)
                      if (getT(i).equals(currentMode) && i.g.equals(currentCat) && i.pid.equals(pid))
                          filtered.add(i);
                  currentItems = filtered;
                  rvI.setAdapter(new ItemAdapter(currentItems));
                  rvI.postDelayed(() -> {
                      if (rvI.getChildCount() > 0) rvI.getChildAt(0).requestFocus();
                  }, 200);
              }

              private void toggleFav() {
                  if (currentCh == null) return;
                  int idx = -1;
                  for (int i = 0; i < favList.size(); i++)
                      if (favList.get(i).u.equals(currentCh.u)) idx = i;
                  if (idx != -1) favList.remove(idx);
                  else favList.add(currentCh);
                  getSharedPreferences("p", MODE_PRIVATE).edit().putString("f", new Gson().toJson(favList)).apply();
                  updateFavIcon();
              }

              private void updateFavIcon() {
                  boolean isFav = false;
                  if (currentCh != null)
                      for (Ch f : favList)
                          if (f.u.equals(currentCh.u)) isFav = true;
                  fullFavBtn.setImageResource(isFav ? android.R.drawable.btn_star_big_on : android.R.drawable.btn_star_big_off);
              }

              private Runnable hideOverlay = () -> overlay.setVisibility(View.GONE);

              private void showInfobar() {
                  infoBar.setVisibility(View.VISIBLE);
                  handler.removeCallbacks(hideInfobar);
                  handler.postDelayed(hideInfobar, 4000);
              }

              private Runnable hideInfobar = () -> infoBar.setVisibility(View.GONE);

              private void updateProgress() {
                  if (!currentMode.equals("live")) {
                      if (useVLC && vlcPlayer != null) {
                          long dur = vlcPlayer.getLength();
                          long pos = vlcPlayer.getTime();
                          if (dur > 0) {
                              seekBar.setMax((int) dur);
                              seekBar.setProgress((int) pos);
                              tTime.setText(formatTime(pos) + " / " + formatTime(dur));
                          }
                      } else if (exoPlayer != null) {
                          long dur = exoPlayer.getDuration();
                          long pos = exoPlayer.getCurrentPosition();
                          if (dur > 0) {
                              seekBar.setMax((int) dur);
                              seekBar.setProgress((int) pos);
                              tTime.setText(formatTime(pos) + " / " + formatTime(dur));
                          }
                      }
                  }
                  handler.postDelayed(this::updateProgress, 1000);
              }

              private String formatTime(long ms) {
                  long s = (ms / 1000) % 60, m = (ms / 60000) % 60, h = (ms / 3600000);
                  return h > 0 ? String.format("%02d:%02d:%02d", h, m, s) : String.format("%02d:%02d", m, s);
              }

              private void loadData() {
                  String url = "https://gist.githubusercontent.com/rabiebobo3/d498347610d7312b3e9be88093117620/raw/list.m3u";
                  Volley.newRequestQueue(this).add(new StringRequest(Request.Method.GET, url, res -> {
                      parse(res);
                      setMode("live");
                  }, error -> Toast.makeText(this, "خطأ في تحميل البيانات", Toast.LENGTH_SHORT).show()));
              }

              private void loadFavs() {
                  String j = getSharedPreferences("p", MODE_PRIVATE).getString("f", "[]");
                  favList = new Gson().fromJson(j, new TypeToken<List<Ch>>() {}.getType());
                  if (favList == null) favList = new ArrayList<>();
              }

              private void parse(String text) {
                  database.clear();
                  live.clear();
                  movie.clear();
                  series.clear();
                  String[] lines = text.split("\n");
                  Ch cur = null;
                  for (String l : lines) {
                      if (l.contains("#EXTINF:")) {
                          cur = new Ch();
                          cur.n = l.split(",").length > 1 ? l.split(",")[1].trim() : "Unknown";
                          cur.g = l.contains("group-title=\"") ? l.split("group-title=\"")[1].split("\"")[0] : "عام";
                          cur.l = l.contains("tvg-logo=\"") ? l.split("tvg-logo=\"")[1].split("\"")[0] : "";
                          cur.id = l.contains("tvg-id=\"") ? l.split("tvg-id=\"")[1].split("\"")[0] : "";
                          cur.pid = l.contains("parent-id=\"") ? l.split("parent-id=\"")[1].split("\"")[0] : "root";
                          cur.isF = l.contains("is-folder=\"") ? l.split("is-folder=\"")[1].split("\"")[0] : "0";
                      } else if (l.trim().startsWith("http") && cur != null) {
                          cur.u = l.trim();
                          database.add(cur);
                          String type = getT(cur);
                          Map<String, List<Ch>> d = type.equals("movie") ? movie : (type.equals("series") ? series : live);
                          if (!d.containsKey(cur.g)) d.put(cur.g, new ArrayList<>());
                          d.get(cur.g).add(cur);
                          cur = null;
                      }
                  }
              }

              private void hideSystemUI() {
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                          View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                          View.SYSTEM_UI_FLAG_FULLSCREEN
                  );
              }

              private void showExitDialog() {
                  new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog_Alert)
                      .setTitle("خروج")
                      .setMessage("هل تريد الخروج من التطبيق؟")
                      .setPositiveButton("نعم", (d, w) -> finish())
                      .setNegativeButton("لا", null)
                      .show();
              }

              class GroupAdapter extends RecyclerView.Adapter<GroupAdapter.VH> {
                  List<String> g;

                  GroupAdapter(List<String> g) {
                      this.g = g;
                  }

                  public VH onCreateViewHolder(ViewGroup p, int t) {
                      return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_channel, p, false));
                  }

                  public void onBindViewHolder(VH h, int i) {
                      h.n.setText(g.get(i));
                      h.itemView.setFocusable(true);
                      h.itemView.setOnFocusChangeListener((v, f) -> v.setScaleX(f ? 1.05f : 1f));
                      h.itemView.setOnClickListener(v -> {
                          currentCat = g.get(i);
                          renderGallery("root");
                      });
                  }

                  public int getItemCount() {
                      return g.size();
                  }

                  class VH extends RecyclerView.ViewHolder {
                      TextView n;

                      VH(View v) {
                          super(v);
                          n = v.findViewById(R.id.txt_name);
                      }
                  }
              }

              class ItemAdapter extends RecyclerView.Adapter<ItemAdapter.VH> {
                  List<Ch> items;

                  ItemAdapter(List<Ch> i) {
                      items = i;
                  }

                  public int getItemViewType(int p) {
                      return currentMode.equals("live") ? 0 : 1;
                  }

                  public VH onCreateViewHolder(ViewGroup p, int t) {
                      return new VH(LayoutInflater.from(p.getContext()).inflate(t == 0 ? R.layout.item_channel : R.layout.item_card, p, false));
                  }

                  public void onBindViewHolder(VH h, int i) {
                      Ch c = items.get(i);
                      h.n.setText(c.n);
                      Glide.with(h.itemView).load(c.l).into(h.img);
                      h.itemView.setFocusable(true);
                      h.itemView.setOnFocusChangeListener((v, f) -> v.setScaleX(f ? 1.08f : 1f));
                      h.itemView.setOnClickListener(v -> {
                          if ("1".equals(c.isF)) {
                              historyStack.push(currentParentId);
                              renderGallery(c.id);
                              savedItemIndex = 0;
                          } else {
                              long t = System.currentTimeMillis();
                              boolean isDouble = (t - lastClickTime < 500);
                              lastClickTime = t;
                              playChannel(c, i, isDouble);
                          }
                      });
                  }

                  public int getItemCount() {
                      return items.size();
                  }

                  class VH extends RecyclerView.ViewHolder {
                      TextView n;
                      ImageView img;

                      VH(View v) {
                          super(v);
                          n = v.findViewById(R.id.txt_name);
                          img = v.findViewById(R.id.img_logo);
                      }
                  }
              }
          }
