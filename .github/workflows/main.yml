name: Rabie_Pro_V41_VLC_Integrated

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_V41_With_VLC_Engine
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          
          # 1. إعدادات الذاكرة لضمان بناء مكتبة VLC الضخمة بدون أخطاء
          echo "org.gradle.jvmargs=-Xmx4g" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/values
          
          curl -Lo app/src/main/res/mipmap-hdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://f.top4top.io/p_3734etr9q0.jpg
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#05030A</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorAccent">#FF9100</color>
              <color name="white">#FFFFFF</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Rabie Pro V41 VLC</string>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"/></network-security-config>' > app/src/main/res/xml/network_security_config.xml

          # تعديل الواجهة لإضافة حاوية VLC (VLCVideoLayout)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent" 
              android:background="#05030A" android:keepScreenOn="true">
              
              <LinearLayout android:id="@+id/splash_screen" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#05030A" android:gravity="center" android:elevation="20dp">
                  <androidx.cardview.widget.CardView android:layout_width="150dp" android:layout_height="150dp" app:cardCornerRadius="75dp" app:cardBackgroundColor="#000">
                      <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                  </androidx.cardview.widget.CardView>
              </LinearLayout>

              <LinearLayout android:id="@+id/main_ui_container" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:visibility="gone">
                  <LinearLayout android:id="@+id/top_tabs" android:layout_width="match_parent" android:layout_height="65dp" android:background="#000" android:gravity="center_vertical" android:padding="10dp">
                      <androidx.cardview.widget.CardView android:layout_width="45dp" android:layout_height="45dp" app:cardCornerRadius="22.5dp" app:cardBackgroundColor="#000" android:layout_marginRight="10dp">
                          <ImageView android:layout_width="match_parent" android:layout_height="match_parent" android:src="@drawable/app_logo" android:scaleType="centerCrop"/>
                      </androidx.cardview.widget.CardView>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RABIE PRO" android:textColor="#ff9100" android:textStyle="bold" android:textSize="22sp" android:layout_marginRight="20dp"/>
                      <View android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="1"/>
                      <Button android:id="@+id/tab_live" android:layout_width="wrap_content" android:layout_height="42dp" android:text="القنوات" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style"/>
                      <Button android:id="@+id/tab_movie" android:layout_width="wrap_content" android:layout_height="42dp" android:text="الأفلام" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style"/>
                      <Button android:id="@+id/tab_series" android:layout_width="wrap_content" android:layout_height="42dp" android:text="المسلسلات" android:textColor="#EEE" android:textSize="13sp" android:layout_marginLeft="8dp" android:focusable="true" android:background="@drawable/tab_button_style"/>
                      <Button android:id="@+id/tab_fav" android:layout_width="55dp" android:layout_height="42dp" android:text="⭐" android:textColor="#ff9100" android:textSize="16sp" android:focusable="true" android:background="@drawable/tab_button_style"/>
                      <ImageButton android:id="@+id/btn_settings_vlc" android:layout_width="45dp" android:layout_height="42dp" android:src="@android:drawable/ic_menu_manage" android:background="@drawable/tab_button_style" android:tint="#ff9100" android:layout_marginLeft="8dp"/>
                  </LinearLayout>

                  <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="horizontal" android:baselineAligned="false">
                      <LinearLayout android:id="@+id/left_side_container" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.55" android:orientation="vertical" android:padding="10dp">
                          <androidx.cardview.widget.CardView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.65" app:cardCornerRadius="15dp" app:cardBackgroundColor="#000" app:cardElevation="12dp">
                              <FrameLayout android:layout_width="match_parent" android:layout_height="match_parent">
                                  <androidx.media3.ui.PlayerView android:id="@+id/small_player" android:layout_width="match_parent" android:layout_height="match_parent" app:use_controller="false"/>
                                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_small_view" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
                              </FrameLayout>
                              <ProgressBar android:id="@+id/loading_s" android:layout_width="50dp" android:layout_height="50dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
                          </androidx.cardview.widget.CardView>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="0.35" android:padding="20dp" android:layout_marginTop="10dp" android:background="@drawable/tab_button_style" android:orientation="vertical">
                              <TextView android:id="@+id/txt_title" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="اختر محتوى" android:textColor="#ff9100" android:textSize="20sp" android:textStyle="bold"/>
                              <Button android:id="@+id/btn_toggle_fav" android:layout_width="wrap_content" android:layout_height="42dp" android:text="⭐ إضافة للمفضلة" android:layout_marginTop="15dp" android:focusable="true" android:background="@drawable/focus_highlight" android:paddingHorizontal="25dp" android:textColor="#FFF"/>
                          </LinearLayout>
                      </LinearLayout>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_items" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.25" android:background="#0A0817"/>
                      <androidx.recyclerview.widget.RecyclerView android:id="@+id/rv_groups" android:layout_width="0dp" android:layout_height="match_parent" android:layout_weight="0.20" android:background="#120E26"/>
                  </LinearLayout>
              </LinearLayout>

              <FrameLayout android:id="@+id/full_container" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone" android:background="#000" android:focusable="true" android:clickable="true">
                  <androidx.media3.ui.PlayerView android:id="@+id/full_player" android:layout_width="match_parent" android:layout_height="match_parent" app:resize_mode="fill" app:use_controller="false" />
                  <org.videolan.libvlc.util.VLCVideoLayout android:id="@+id/vlc_full_view" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone"/>
                  
                  <LinearLayout android:id="@+id/overlay_full" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="bottom" android:visibility="gone">
                      <LinearLayout android:id="@+id/infobar_layout" android:layout_width="match_parent" android:layout_height="wrap_content" android:background="#E6000000" android:padding="15dp" android:gravity="center_vertical">
                          <androidx.cardview.widget.CardView android:layout_width="60dp" android:layout_height="60dp" app:cardCornerRadius="30dp" app:cardBackgroundColor="#000">
                              <ImageView android:id="@+id/full_ch_logo" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="centerCrop"/>
                          </androidx.cardview.widget.CardView>
                          <TextView android:id="@+id/full_ch_name" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textColor="#ff9100" android:textSize="22sp" android:textStyle="bold" android:layout_marginLeft="15dp"/>
                          <ImageButton android:id="@+id/full_fav_btn" android:layout_width="50dp" android:layout_height="50dp" android:src="@android:drawable/btn_star_big_off" android:background="@drawable/round_btn"/>
                          <androidx.mediarouter.app.MediaRouteButton android:id="@+id/media_route_button" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/round_btn" android:layout_marginLeft="10dp"/>
                      </LinearLayout>
                  </LinearLayout>
                  <ProgressBar android:id="@+id/loading_f" android:layout_width="80dp" android:layout_height="80dp" android:layout_gravity="center" android:visibility="gone" android:indeterminateTint="#ff9100"/>
              </FrameLayout>
          </RelativeLayout>
          EOF

          # كود الجافا المطور (V41 + محرك VLC)
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.activity.OnBackPressedCallback;
          import androidx.appcompat.app.AlertDialog;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.media3.common.*;
          import androidx.media3.exoplayer.*;
          import androidx.media3.ui.PlayerView;
          import androidx.recyclerview.widget.*;
          import com.android.volley.*;
          import com.android.volley.toolbox.*;
          import com.bumptech.glide.Glide;
          import com.google.gson.Gson;
          import com.google.gson.reflect.TypeToken;
          import java.util.*;
          import com.google.android.gms.cast.framework.*;
          import androidx.mediarouter.app.MediaRouteButton;
          import org.videolan.libvlc.LibVLC;
          import org.videolan.libvlc.Media;
          import org.videolan.libvlc.MediaPlayer;
          import org.videolan.libvlc.util.VLCVideoLayout;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer exoPlayer;
              private LibVLC libVLC;
              private MediaPlayer vlcPlayer;
              private PlayerView exoSmall, exoFull;
              private VLCVideoLayout vlcSmall, vlcFull;
              private boolean useVLC = false;

              private List<Ch> database = new ArrayList<>();
              private Map<String, List<Ch>> live = new LinkedHashMap<>(), movie = new LinkedHashMap<>(), series = new LinkedHashMap<>();
              private List<Ch> favList = new ArrayList<>(), currentItems = new ArrayList<>();
              private Stack<String> historyStack = new Stack<>();
              private String currentParentId = "root", currentCat = "", currentMode = "live";
              private Ch currentCh;
              private RecyclerView rvG, rvI;
              private TextView tTitle, tFullChName;
              private View mainUI, fullCont, overlay, splash, leftSide;
              private ImageView fullChLogo, fullFavBtn;
              private ProgressBar ps, pf;
              private Handler handler = new Handler(Looper.getMainLooper());
              private long lastClickTime = 0;
              private int savedItemIndex = -1;

              static class Ch { String n, u, g, l, id, pid, isF; }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  hideSystemUI();

                  SharedPreferences pref = getSharedPreferences("set", MODE_PRIVATE);
                  useVLC = pref.getBoolean("vlc", false);

                  CastButtonFactory.setUpMediaRouteButton(getApplicationContext(), findViewById(R.id.media_route_button));

                  splash = findViewById(R.id.splash_screen); mainUI = findViewById(R.id.main_ui_container);
                  leftSide = findViewById(R.id.left_side_container);
                  fullChLogo = findViewById(R.id.full_ch_logo); tFullChName = findViewById(R.id.full_ch_name);
                  fullFavBtn = findViewById(R.id.full_fav_btn);
                  
                  exoSmall = findViewById(R.id.small_player); exoFull = findViewById(R.id.full_player);
                  vlcSmall = findViewById(R.id.vlc_small_view); vlcFull = findViewById(R.id.vlc_full_view);
                  fullCont = findViewById(R.id.full_container); overlay = findViewById(R.id.overlay_full);
                  ps = findViewById(R.id.loading_s); pf = findViewById(R.id.loading_f);

                  initExo();
                  initVLC();
                  updatePlayerViews();

                  handler.postDelayed(() -> { splash.setVisibility(View.GONE); mainUI.setVisibility(View.VISIBLE); }, 2000);

                  findViewById(R.id.btn_settings_vlc).setOnClickListener(v -> showPlayerSettings());
                  findViewById(R.id.btn_toggle_fav).setOnClickListener(v -> toggleFav());
                  fullFavBtn.setOnClickListener(v -> toggleFav());
                  fullCont.setOnClickListener(v -> toggleOverlay());

                  rvG = findViewById(R.id.rv_groups); rvI = findViewById(R.id.rv_items);
                  tTitle = findViewById(R.id.txt_title);
                  rvG.setLayoutManager(new LinearLayoutManager(this));

                  loadFavs(); loadData();

                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override public void handleOnBackPressed() {
                          if (fullCont.getVisibility() == View.VISIBLE) toggleFull(false);
                          else if (!historyStack.isEmpty()) renderGallery(historyStack.pop());
                          else finish();
                      }
                  });

                  findViewById(R.id.tab_live).setOnClickListener(v -> setMode("live"));
                  findViewById(R.id.tab_movie).setOnClickListener(v -> setMode("movie"));
                  findViewById(R.id.tab_series).setOnClickListener(v -> setMode("series"));
                  findViewById(R.id.tab_fav).setOnClickListener(v -> setMode("fav"));
              }

              private void initExo() {
                  exoPlayer = new ExoPlayer.Builder(this).build();
                  exoSmall.setPlayer(exoPlayer);
                  exoPlayer.addListener(new Player.Listener() {
                      public void onPlaybackStateChanged(int s) {
                          int v = (s == Player.STATE_BUFFERING) ? View.VISIBLE : View.GONE;
                          ps.setVisibility(v); pf.setVisibility(v);
                      }
                  });
              }

              private void initVLC() {
                  ArrayList<String> options = new ArrayList<>();
                  options.add("--network-caching=5000");
                  libVLC = new LibVLC(this, options);
                  vlcPlayer = new MediaPlayer(libVLC);
              }

              private void updatePlayerViews() {
                  exoSmall.setVisibility(useVLC ? View.GONE : View.VISIBLE);
                  vlcSmall.setVisibility(useVLC ? View.VISIBLE : View.GONE);
              }

              private void showPlayerSettings() {
                  String[] ops = {"ExoPlayer (سريع)", "VLC Player (ضد التقطيع)"};
                  new AlertDialog.Builder(this, android.R.style.Theme_DeviceDefault_Dialog)
                      .setTitle("اختر محرك التشغيل")
                      .setSingleChoiceItems(ops, useVLC ? 1 : 0, (d, w) -> {
                          useVLC = (w == 1);
                          getSharedPreferences("set", MODE_PRIVATE).edit().putBoolean("vlc", useVLC).apply();
                          updatePlayerViews();
                          stopAll();
                          d.dismiss();
                      }).show();
              }

              private void playChannel(Ch c, int pos, boolean doubleClick) {
                  currentCh = c; savedItemIndex = pos; stopAll();
                  if (useVLC) {
                      vlcPlayer.attachViews(fullCont.getVisibility() == View.VISIBLE ? vlcFull : vlcSmall, null, false, false);
                      Media media = new Media(libVLC, Uri.parse(c.u));
                      media.setHWDecoderEnabled(true, true);
                      vlcPlayer.setMedia(media); vlcPlayer.play();
                  } else {
                      exoPlayer.setMediaItem(MediaItem.fromUri(c.u));
                      exoPlayer.prepare(); exoPlayer.play();
                  }
                  tTitle.setText(c.n); tFullChName.setText(c.n); Glide.with(this).load(c.l).into(fullChLogo); updateFavIcon();
                  if (doubleClick) toggleFull(true);
              }

              private void stopAll() { if(exoPlayer.isPlaying()) exoPlayer.stop(); if(vlcPlayer.isPlaying()) vlcPlayer.stop(); }

              private void toggleFull(boolean full) {
                  stopAll();
                  if (full) {
                      mainUI.setVisibility(View.GONE); fullCont.setVisibility(View.VISIBLE);
                      exoFull.setVisibility(useVLC ? View.GONE : View.VISIBLE);
                      vlcFull.setVisibility(useVLC ? View.VISIBLE : View.GONE);
                      if (useVLC) exoFull.setPlayer(null); else exoFull.setPlayer(exoPlayer);
                      playChannel(currentCh, savedItemIndex, false);
                  } else {
                      fullCont.setVisibility(View.GONE); mainUI.setVisibility(View.VISIBLE);
                      updatePlayerViews();
                      playChannel(currentCh, savedItemIndex, false);
                  }
              }

              private void toggleOverlay() {
                  overlay.setVisibility(overlay.getVisibility() == View.VISIBLE ? View.GONE : View.VISIBLE);
                  if (overlay.getVisibility() == View.VISIBLE) handler.postDelayed(() -> overlay.setVisibility(View.GONE), 4000);
              }

              private void setMode(String m) {
                  currentMode = m; historyStack.clear();
                  if(m.equals("fav")) { currentItems = new ArrayList<>(favList); rvG.setVisibility(View.GONE); rvI.setAdapter(new ItemAdapter(currentItems)); return; }
                  rvG.setVisibility(View.VISIBLE);
                  Map<String, List<Ch>> d = m.equals("movie") ? movie : (m.equals("series") ? series : live);
                  List<String> groups = new ArrayList<>(d.keySet());
                  rvG.setAdapter(new GroupAdapter(groups));
                  if (!groups.isEmpty()) { currentCat = groups.get(0); renderGallery("root"); }
              }

              private void renderGallery(String pid) {
                  currentParentId = pid; List<Ch> filtered = new ArrayList<>();
                  for (Ch i : database) if (getT(i).equals(currentMode) && i.g.equals(currentCat) && i.pid.equals(pid)) filtered.add(i);
                  currentItems = filtered; rvI.setAdapter(new ItemAdapter(currentItems));
              }

              private String getT(Ch c) { 
                  String g = c.g.toLowerCase();
                  if (g.contains("movie") || g.contains("أفلام")) return "movie";
                  if (g.contains("series") || g.contains("مسلسل") || "1".equals(c.isF)) return "series";
                  return "live";
              }

              private void loadData() { String url = "https://gist.githubusercontent.com/rabiebobo3/d498347610d7312b3e9be88093117620/raw/list.m3u"; Volley.newRequestQueue(this).add(new StringRequest(Request.Method.GET, url, res -> { parse(res); setMode("live"); }, null)); }
              private void loadFavs() { String j = getSharedPreferences("p", MODE_PRIVATE).getString("f", "[]"); favList = new Gson().fromJson(j, new TypeToken<List<Ch>>(){}.getType()); if(favList == null) favList = new ArrayList<>(); }
              private void toggleFav() {
                  if (currentCh == null) return;
                  int idx = -1; for (int i=0; i<favList.size(); i++) if(favList.get(i).u.equals(currentCh.u)) idx = i;
                  if (idx != -1) favList.remove(idx); else favList.add(currentCh);
                  getSharedPreferences("p", MODE_PRIVATE).edit().putString("f", new Gson().toJson(favList)).apply();
                  updateFavIcon();
              }
              private void updateFavIcon() {
                  boolean isFav = false; if (currentCh != null) for (Ch f : favList) if(f.u.equals(currentCh.u)) isFav = true;
                  fullFavBtn.setImageResource(isFav ? android.R.drawable.btn_star_big_on : android.R.drawable.btn_star_big_off);
              }

              private void parse(String text) {
                  database.clear(); live.clear(); movie.clear(); series.clear();
                  String[] lines = text.split("\n"); Ch cur = null;
                  for (String l : lines) {
                      if (l.contains("#EXTINF:")) {
                          cur = new Ch(); cur.n = l.split(",").length > 1 ? l.split(",")[1].trim() : "Unknown";
                          cur.g = l.contains("group-title=\"") ? l.split("group-title=\"")[1].split("\"")[0] : "عام";
                          cur.l = l.contains("tvg-logo=\"") ? l.split("tvg-logo=\"")[1].split("\"")[0] : "";
                          cur.id = l.contains("tvg-id=\"") ? l.split("tvg-id=\"")[1].split("\"")[0] : "";
                          cur.pid = l.contains("parent-id=\"") ? l.split("parent-id=\"")[1].split("\"")[0] : "root";
                          cur.isF = l.contains("is-folder=\"") ? l.split("is-folder=\"")[1].split("\"")[0] : "0";
                      } else if (l.trim().startsWith("http") && cur != null) {
                          cur.u = l.trim(); database.add(cur);
                          String type = getT(cur); Map<String, List<Ch>> d = type.equals("movie")?movie:(type.equals("series")?series:live);
                          if (!d.containsKey(cur.g)) d.put(cur.g, new ArrayList<>()); d.get(cur.g).add(cur); cur = null;
                      }
                  }
              }

              private void hideSystemUI() { getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_FULLSCREEN); }

              class GroupAdapter extends RecyclerView.Adapter<GroupAdapter.VH> {
                  List<String> g; GroupAdapter(List<String> g) { this.g = g; }
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_channel, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      h.n.setText(g.get(i)); h.itemView.setOnClickListener(v -> { currentCat = g.get(i); renderGallery("root"); });
                  }
                  public int getItemCount() { return g.size(); }
                  class VH extends RecyclerView.ViewHolder { TextView n; VH(View v) { super(v); n = v.findViewById(R.id.txt_name); } }
              }

              class ItemAdapter extends RecyclerView.Adapter<ItemAdapter.VH> {
                  List<Ch> items; ItemAdapter(List<Ch> i) { items = i; }
                  public int getItemViewType(int p) { return currentMode.equals("live") ? 0 : 1; }
                  public VH onCreateViewHolder(ViewGroup p, int t) { return new VH(LayoutInflater.from(p.getContext()).inflate(t==0?R.layout.item_channel:R.layout.item_card, p, false)); }
                  public void onBindViewHolder(VH h, int i) {
                      Ch c = items.get(i); h.n.setText(c.n); Glide.with(h.itemView).load(c.l).into(h.img);
                      h.itemView.setOnClickListener(v -> {
                          if ("1".equals(c.isF)) { historyStack.push(currentParentId); renderGallery(c.id); }
                          else { long t = System.currentTimeMillis(); boolean isDouble = (t - lastClickTime < 500); lastClickTime = t; playChannel(c, i, isDouble); }
                      });
                  }
                  public int getItemCount() { return items.size(); }
                  class VH extends RecyclerView.ViewHolder { TextView n; ImageView img; VH(View v) { super(v); n = v.findViewById(R.id.txt_name); img = v.findViewById(R.id.img_logo); } }
              }
              
              @Override protected void onDestroy() { super.onDestroy(); stopAll(); if(exoPlayer!=null) exoPlayer.release(); if(vlcPlayer!=null) vlcPlayer.release(); }
          }
          EOF

          # ملفات التصميم الأخرى (نفس التي لديك)
          cat <<EOF > app/src/main/res/drawable/round_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval"><solid android:color="#25FFFFFF"/><stroke android:width="1dp" android:color="#40FFFFFF"/></shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/tab_button_style.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_focused="true"><shape><solid android:color="#ff9100"/><corners android:radius="20dp"/></shape></item>
              <item><shape><solid android:color="#120E26"/><corners android:radius="20dp"/><stroke android:width="1dp" android:color="#261E4A"/></shape></item>
          </selector>
          EOF
          cat <<EOF > app/src/main/res/drawable/focus_highlight.xml
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_focused="true"><shape><solid android:color="#33FF9100"/><stroke android:width="4dp" android:color="#ff9100"/><corners android:radius="12dp"/></shape></item>
              <item><shape><solid android:color="@android:color/transparent"/><stroke android:width="1dp" android:color="#20FFFFFF"/><corners android:radius="12dp"/></shape></item>
          </selector>
          EOF
          cat <<EOF > app/src/main/res/layout/item_channel.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center_vertical" android:padding="12dp" android:focusable="true" android:background="@drawable/focus_highlight">
              <TextView android:id="@+id/txt_name" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textColor="#FFF" android:textSize="15sp" android:gravity="right" android:paddingRight="12dp" android:textStyle="bold"/>
              <ImageView android:id="@+id/img_logo" android:layout_width="40dp" android:layout_height="40dp" android:scaleType="centerInside"/>
          </LinearLayout>
          EOF
          cat <<EOF > app/src/main/res/layout/item_card.xml
          <androidx.cardview.widget.CardView xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="220dp" android:layout_margin="8dp" app:cardCornerRadius="14dp" app:cardElevation="10dp" android:focusable="true" android:background="@drawable/focus_highlight">
              <RelativeLayout android:layout_width="match_parent" android:layout_height="match_parent">
                  <ImageView android:id="@+id/img_logo" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="centerCrop"/>
                  <View android:layout_width="match_parent" android:layout_height="60dp" android:layout_alignParentBottom="true" android:background="#E6000000"/>
                  <TextView android:id="@+id/txt_name" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:padding="8dp" android:textColor="#ff9100" android:textSize="13sp" android:textStyle="bold" android:maxLines="2" android:gravity="center"/>
              </RelativeLayout>
          </androidx.cardview.widget.CardView>
          EOF

          # ملف البناء مع حلول التعارض وإضافة مكتبة VLC
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { applicationId "com.rabie.iptv"; minSdk 21; targetSdk 34; versionCode 41; versionName "41.0" }
              packagingOptions {
                  resources.excludes += "DebugProbesKt.bin"
                  pickFirst 'lib/*/libc++_shared.so'
              }
          }
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              implementation 'androidx.mediarouter:mediarouter:1.7.0'
              implementation 'com.google.android.gms:play-services-cast-framework:21.4.0'
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:label="Rabie Pro" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
                  <meta-data android:name="com.google.android.gms.cast.framework.OPTIONS_PROVIDER_CLASS_NAME" android:value="com.rabie.iptv.CastOptionsProvider"/>
                  <activity android:name="com.rabie.iptv.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_Apk
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V41_VLC_Exo, path: app/build/outputs/apk/debug/*.apk }
