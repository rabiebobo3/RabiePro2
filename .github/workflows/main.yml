name: Rabie_Pro_V53_Final_Final
on: [push]

jobs:
  build_rocket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Everything From Scratch
        run: |
          # 1. إنشاء المجلدات
          mkdir -p app/src/main/java/com/rabie/iptv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 2. إنشاء ملفات الإعدادات (Core Configuration)
          cat <<EOF > settings.gradle
          rootProject.name = "RabiePro"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. ملف بناء التطبيق (App Level)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode 53
                  versionName "5.3"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'org.videolan.android:libvlc-all:3.6.0-eap11'
          }
          EOF

          # 4. المانيفست والكود
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) { super.onCreate(s); setContentView(android.R.layout.simple_list_item_1); }
          }
          EOF

      - name: Build With Embedded Gradle
        run: |
          # هنا السر: نستخدم gradle المنصب في النظام مباشرة بدل الـ wrapper المفقود
          gradle assembleDebug --stacktrace

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_Pro_V53
          path: app/build/outputs/apk/debug/*.apk
