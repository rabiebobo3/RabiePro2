name: Rabie_Pro_V52_Final_Fix
on: [push]

jobs:
  build_rocket:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Project Structure
        run: |
          mkdir -p app/src/main/java/com/rabie/iptv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. إعداد الـ Repositories في settings.gradle (الطريقة الحديثة)
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOF

          # 2. ملف build.gradle الرئيسي (فارغ ومنظم)
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'com.android.library' version '8.2.2' apply false
          }
          EOF

          # 3. ملف build.gradle الخاص بالتطبيق (هنا السر)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode 52
                  versionName "5.2"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'org.videolan.android:libvlc-all:3.6.0-eap11'
          }
          EOF

          # 4. ملف الـ Manifest
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 5. الكود المصدري الكامل (Java)
          cat <<'EOF' > app/src/main/java/com/rabie/iptv/MainActivity.java
          package com.rabie.iptv;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(android.R.layout.simple_list_item_1);
              }
          }
          EOF

      - name: Build with Power
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_Pro_V52_Final
          path: app/build/outputs/apk/debug/*.apk
