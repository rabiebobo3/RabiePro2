              @Override public List<SessionProvider> getAdditionalSessionProviders(Context context) { return null; }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
