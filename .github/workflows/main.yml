name: Rabie_Pro_V42_Final_Fixed
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build_Stable_Optimized
        run: |
          rm -rf app settings.gradle build.gradle gradle.properties .gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); maven { url "https://jitpack.io" } }
          }
          include ':app'
          EOF

          mkdir -p app/src/main/java/com/rabie/iptv app/src/main/res/layout app/src/main/res/drawable app/src/main/res/xml app/src/main/res/values
          
          curl -Lo app/src/main/res/drawable/app_logo.png https://f.top4top.io/p_3734etr9q0.jpg

          # --- قواعد حماية شاملة لمنع الـ Crash عند الفتح ---
          cat <<EOF > app/proguard-rules.pro
          -keep class com.rabie.iptv.** { *; }
          -keep class androidx.media3.** { *; }
          -keep class com.google.android.gms.cast.** { *; }
          -keep class com.google.gson.** { *; }
          -keep class com.bumptech.glide.** { *; }
          -keep class com.android.volley.** { *; }
          
          # حماية واجهات أندرويد الأساسية
          -keep public class * extends android.app.Activity
          -keep public class * extends android.app.Application
          -keep public class * extends android.app.Service
          
          -dontwarn androidx.media3.**
          -dontwarn com.google.android.gms.cast.**
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android { 
              namespace 'com.rabie.iptv'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.rabie.iptv"
                  minSdk 21
                  targetSdk 34
                  versionCode 42
                  versionName "42.0"
                  resConfigs "ar", "en"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      # في نسخة الديباق نوقف التقليص مؤقتاً للتأكد من عمل التطبيق
                      minifyEnabled false
                      shrinkResources false
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.media3:media3-exoplayer:1.2.1'
              implementation 'androidx.media3:media3-ui:1.2.1'
              implementation 'androidx.media3:media3-exoplayer-hls:1.2.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'com.android.volley:volley:1.2.1'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
              implementation 'androidx.mediarouter:mediarouter:1.7.0'
              implementation 'com.google.android.gms:play-services-cast-framework:21.4.0'
          }
          EOF

          # [تأكد من وضع كود MainActivity.java و الـ Layouts هنا كما في المرات السابقة]

          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload_Final_Apk
        uses: actions/upload-artifact@v4
        with: { name: Rabie_Pro_V42_Fixed, path: app/build/outputs/apk/debug/*.apk }
