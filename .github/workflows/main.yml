name: Rabie_Ultimate_Fix
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '11', distribution: 'temurin'} # استعملنا Java 11 لأنها الأضمن للبناء السريع

      - name: Build APK ORA Style
        run: |
          # تنظيف شامل
          rm -rf *
          mkdir -p app/src/main/java/com/rabie/ora/ app/src/main/res/layout/ app/src/main/res/drawable/ app/src/main/res/values/
          
          # إعدادات Gradle يدوية 100%
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          
          # تطبيق الديزاين البنفسجي (ORA) في ملف واحد
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace 'com.rabie.ora'
              compileSdk 33
              defaultConfig { applicationId "com.rabie.ora"; minSdk 21; targetSdk 33; versionCode 1; versionName "1.0" }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # تصميم الواجهة البنفسجية المظلمة
          echo '<shape xmlns:android="http://schemas.android.com/apk/res/android"><gradient android:startColor="#1A0033" android:endColor="#000000" android:angle="270" /></shape>' > app/src/main/res/drawable/ora_bg.xml
          
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="@drawable/ora_bg">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Rabie ORA Pro" android:textColor="#A020F0" android:layout_centerInParent="true" android:textSize="30sp" android:textStyle="bold" />
          </RelativeLayout>
          EOF

          # كود الجافا والمانيفست
          echo 'package com.rabie.ora; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { protected void onCreate(Bundle s) { super.onCreate(s); setContentView(R.layout.activity_main); } }' > app/src/main/java/com/rabie/ora/MainActivity.java
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Rabie ORA" android:theme="@style/Theme.AppCompat.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

          # تنفيذ البناء بنسخة مستقرة
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with: {name: Rabie_ORA_Result, path: app/build/outputs/apk/debug/*.apk}
