name: Build_Rabie_Pro_ORA_Style_Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. بناء هيكل المجلدات الاحترافي
      - name: Create Full Structure
        run: |
          mkdir -p app/src/main/java/com/rabie/ora/
          mkdir -p app/src/main/res/layout/
          mkdir -p app/src/main/res/values/
          mkdir -p app/src/main/res/drawable/

      # 2. ملفات الإعدادات (Gradle Settings)
      - name: Create Settings
        run: echo "include ':app'" > settings.gradle

      # 3. ملف build.gradle للمشروع (Project)
      - name: Create Project Build
        run: |
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      # 4. ملف build.gradle للتطبيق (App) - مع كل المكتبات اللازمة للجمالية
      - name: Create App Build
        run: |
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.ora'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.ora"
                  minSdk 21
                  targetSdk 34
                  versionCode 42
                  versionName "4.2-ORA"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
              implementation 'com.google.android.exoplayer:exoplayer-ui:2.19.1'
              implementation 'com.github.bumptech.glide:glide:4.16.0'
          }
          EOF

      # 5. تصميم الخلفية المتدرجة (Gradient Background) مثل ORA
      - name: Create ORA Style Drawables
        run: |
          cat <<EOF > app/src/main/res/drawable/ora_gradient.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient
                  android:startColor="#1A0033"
                  android:endColor="#000000"
                  android:angle="270" />
          </shape>
          EOF
          cat <<EOF > app/src/main/res/drawable/card_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#2B004D" />
              <corners android:radius="15dp" />
          </shape>
          EOF

      # 6. واجهة المستخدم (XML Layout) - تصميم Netflix Style
      - name: Create Advanced Layout
        run: |
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/ora_gradient">

              <com.google.android.exoplayer2.ui.StyledPlayerView
                  android:id="@+id/main_player"
                  android:layout_width="match_parent"
                  android:layout_height="250dp"
                  android:background="#000000" />

              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/channel_list"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:layout_below="@id/main_player"
                  android:padding="10dp"
                  android:clipToPadding="false" />

              <ProgressBar
                  android:id="@+id/ora_loader"
                  android:layout_width="80dp"
                  android:layout_height="80dp"
                  android:layout_centerInParent="true"
                  android:indeterminateTint="#A020F0"
                  android:visibility="gone" />

          </RelativeLayout>
          EOF

      # 7. كود الجافا (The Brain) - نظام إدارة القنوات والبث بدون تجمد
      - name: Create MainActivity.java
        run: |
          cat <<EOF > app/src/main/java/com/rabie/ora/MainActivity.java
          package com.rabie.ora;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.ProgressBar;
          import androidx.appcompat.app.AppCompatActivity;
          import com.google.android.exoplayer2.*;
          import com.google.android.exoplayer2.ui.StyledPlayerView;

          public class MainActivity extends AppCompatActivity {
              private ExoPlayer player;
              private ProgressBar loader;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  loader = findViewById(R.id.ora_loader);
                  StyledPlayerView playerView = findViewById(R.id.main_player);

                  // ضبط نظام التحكم في التحميل (Buffer) لضمان عدم التقطيع
                  DefaultLoadControl loadControl = new DefaultLoadControl.Builder()
                      .setBufferDurationsMs(100000, 200000, 2500, 5000)
                      .build();

                  player = new ExoPlayer.Builder(this)
                      .setLoadControl(loadControl)
                      .build();
                  
                  playerView.setPlayer(player);

                  player.addListener(new Player.Listener() {
                      @Override
                      public void onPlaybackStateChanged(int state) {
                          loader.setVisibility(state == Player.STATE_BUFFERING ? View.VISIBLE : View.GONE);
                      }
                      @Override
                      public void onPlayerError(PlaybackException error) {
                          // إعادة المحاولة تلقائياً عند الخطأ
                          player.prepare();
                          player.play();
                      }
                  });

                  // مثال لرابط بث M3U8 (يمكنك تغييره برابطك)
                  MediaItem mediaItem = MediaItem.fromUri("https://test-live.com/stream.m3u8");
                  player.setMediaItem(mediaItem);
                  player.prepare();
                  player.play();
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (player != null) player.release();
              }
          }
          EOF

      # 8. المانيفست النهائي (التصاريح)
      - name: Create Manifest
        run: |
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application 
                  android:label="Rabie ORA Pro" 
                  android:usesCleartextTraffic="true"
                  android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                  <activity android:name="com.rabie.ora.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # 9. عملية البناء الشاملة (Build)
      - name: Final Build
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # 10. رفع الـ APK الاحترافي
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie_ORA_Pro_V42
          path: app/build/outputs/apk/debug/*.apk
